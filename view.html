<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#3a8a5a"/>
<title>新郎ダイエット 進捗ページ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f2f6f2;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;color:#1a2e1a}
.wrap{max-width:480px;margin:0 auto;padding:24px 16px 48px}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 10px rgba(40,90,60,0.08);border:1px solid #d4e8d4;margin-bottom:14px}
.label{font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#6a8a6a;font-size:13px}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block;font-size:32px}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spin">🌿</div><div>読み込み中...</div></div></div>

<script>
const OWNER="ksuzukimailjp-arch",REPO="diet-tracker",PATH="data.json";
const G={pri:"#3a8a5a",priMid:"#5aaa78",priLight:"#c8e6c9",priXLight:"#edf7ed",muted:"#6a8a6a",border:"#d4e8d4",text:"#1a2e1a"};

const TASKS=[
  {id:"breakfast",emoji:"🍳",label:"朝ごはん",points:20},
  {id:"water",emoji:"💧",label:"水1.5L",points:10},
  {id:"vegFirst",emoji:"🥗",label:"野菜から",points:10},
  {id:"noLateEat",emoji:"🌙",label:"21時以降NG",points:15},
  {id:"snack",emoji:"🍪",label:"間食我慢",points:15},
  {id:"walk",emoji:"🚶",label:"歩いた",points:20},
  {id:"exercise",emoji:"💪",label:"筋トレ",points:25},
  {id:"weigh",emoji:"⚖️",label:"体重記録",points:5},
];
const BASE=TASKS.reduce((s,t)=>s+t.points,0);

const MEAL_RATINGS=[
  {id:5,emoji:"😇",label:"完璧",color:"#3a8a5a"},{id:4,emoji:"🙂",label:"良い",color:"#5aaa78"},
  {id:3,emoji:"😐",label:"普通",color:"#c9a84c"},{id:2,emoji:"😓",label:"よくない",color:"#d08040"},
  {id:1,emoji:"🍕",label:"ダメ",color:"#c05030"},
];
const MEAL_PTS={5:20,4:15,3:8,2:3,1:0};

const LEVELS=[
  {lv:1,xp:0,title:"見習い新郎"},{lv:2,xp:200,title:"意識高め新郎"},
  {lv:3,xp:500,title:"ダイエット戦士"},{lv:4,xp:900,title:"習慣マスター"},
  {lv:5,xp:1400,title:"鋼の意志"},{lv:6,xp:2000,title:"体型番長"},
  {lv:7,xp:2700,title:"スーツの申し子"},{lv:8,xp:3500,title:"伝説の花婿候補"},
  {lv:9,xp:4400,title:"ウェディング覇者"},{lv:10,xp:5500,title:"完璧な新郎 💍"},
];
const RANKS=[
  {name:"Bronze",min:0,color:"#a06840",emoji:"🥉"},{name:"Silver",min:40,color:"#8a9aaa",emoji:"🥈"},
  {name:"Gold",min:65,color:"#c9a84c",emoji:"🥇"},{name:"Wedding",min:85,color:"#3a8a5a",emoji:"💍"},
];
const DOW=["月","火","水","木","金","土","日"];

const toKey=(d)=>d.toISOString().slice(0,10);
const todayKey=()=>toKey(new Date());
const getWeekDays=()=>{const now=new Date(),dow=(now.getDay()+6)%7;return Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-dow+i);return toKey(d);});};
const getLevel=(xp)=>{let cur=LEVELS[0],next=LEVELS[1];for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){cur=LEVELS[i];next=LEVELS[i+1]||null;break;}}return{cur,next};};
const getRank=(p)=>[...RANKS].reverse().find(r=>p>=r.min)||RANKS[0];

function mkSVGLine(data,color,H){
  if(!data||data.length<2)return`<div style="height:${H}px;display:flex;align-items:center;justify-content:center;color:${G.muted};font-size:11px">2件以上記録するとグラフが表示されます</div>`;
  const vals=data.map(d=>d.v),mn=Math.min(...vals),mx=Math.max(...vals),pad=26,W=320;
  const px=(i)=>pad+(i/(data.length-1))*(W-pad*2);
  const py=(v)=>mx===mn?H/2:H-pad-(((v-mn)/(mx-mn))*(H-pad*2));
  const pts=data.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
  const area=`M${px(0)},${py(data[0].v)} `+data.map((d,i)=>`L${px(i)},${py(d.v)}`).join(" ")+` L${px(data.length-1)},${H} L${px(0)},${H} Z`;
  const step=Math.ceil(data.length/6);
  const circles=data.map((d,i)=>{
    const show=i===0||i===data.length-1||i%step===0;
    return`<circle cx="${px(i)}" cy="${py(d.v)}" r="3.5" fill="${color}"/>${show?`<text x="${px(i)}" y="${py(d.v)-8}" text-anchor="middle" font-size="8" fill="${G.muted}">${d.v}</text><text x="${px(i)}" y="${H-1}" text-anchor="middle" font-size="7" fill="${G.muted}">${d.label}</text>`:""}`;
  }).join("");
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#ag)"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>${circles}</svg>`;
}

async function load(){
  const res=await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${PATH}?t=${Date.now()}`);
  if(!res.ok)throw new Error(res.status);
  return res.json();
}

function render(data){
  const tasks=data.tasks||{},weights=data.weights||{},meals=data.meals||{},exLogs=data.exercises||[];
  const key=todayKey(),checked=tasks[key]||{};

  // streak
  let streak=0;const now=new Date();
  for(let i=0;;i++){const d=new Date(now);d.setDate(d.getDate()-i);const p=TASKS.filter(t=>(tasks[toKey(d)]||{})[t.id]).reduce((s,t)=>s+t.points,0);if(p>0)streak++;else break;}

  // today
  const todayBase=TASKS.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const todayPct=Math.round((todayBase/BASE)*100);
  const mealR=MEAL_RATINGS.find(r=>r.id===meals[key]);
  const doneNum=TASKS.filter(t=>checked[t.id]).length;

  // XP
  const totalXP=Object.entries(tasks).reduce((sum,[date,day])=>{
    const mp=MEAL_PTS[meals[date]]||0;
    return sum+TASKS.filter(t=>day[t.id]).reduce((s,t)=>s+t.points,0)+mp;
  },0);
  const {cur:curLv,next:nextLv}=getLevel(totalXP);
  const lvPct=nextLv?Math.min(100,Math.round(((totalXP-curLv.xp)/(nextLv.xp-curLv.xp))*100)):100;

  // week
  const weekDays=getWeekDays();
  const weekPcts=weekDays.map(k=>{const d=tasks[k]||{};return Math.round((TASKS.filter(t=>d[t.id]).reduce((s,t)=>s+t.points,0)/BASE)*100);});
  const weekAvg=Math.round(weekPcts.reduce((s,v)=>s+v,0)/7);
  const rank=getRank(weekAvg);

  // weight chart
  const wHist=Object.entries(weights).filter(([,v])=>v!=null).sort(([a],[b])=>a.localeCompare(b)).slice(-30).map(([date,v])=>({label:date.slice(5),v}));
  const latestW=wHist.length?wHist[wHist.length-1].v:null;
  const firstW=wHist.length?wHist[0].v:null;
  const wDiff=latestW&&firstW?(latestW-firstW).toFixed(1):null;

  // exercise summary
  const exByDay={};exLogs.forEach(e=>{exByDay[e.date]=(exByDay[e.date]||0)+Number(e.duration||0);});
  const totalExDays=Object.keys(exByDay).length;
  const totalExMin=Object.values(exByDay).reduce((s,v)=>s+v,0);

  // week bars HTML
  const weekBars=weekDays.map((k,i)=>{
    const isT=k===key,isP=k<key,pct=weekPcts[i];
    const mR=MEAL_RATINGS.find(r=>r.id===meals[k]);
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:8px;color:${pct>0?G.pri:G.muted};font-weight:600">${pct>0?pct+"%":""}</div>
      <div style="width:100%;height:${Math.max(3,pct*0.52)}px;background:${isT?G.pri:pct>0?G.priLight:G.border};border-radius:4px;opacity:${!isP&&!isT?0.3:1}"></div>
      ${mR?`<div style="font-size:12px">${mR.emoji}</div>`:`<div style="font-size:12px;opacity:0.2">・</div>`}
      <div style="font-size:9px;color:${isT?G.pri:G.muted};font-weight:${isT?700:400}">${DOW[i]}</div>
    </div>`;
  }).join("");

  // today tasks
  const taskItems=TASKS.map(t=>{
    const done=!!checked[t.id];
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;background:${done?G.priXLight:"#f8faf8"};margin-bottom:6px">
      <span style="font-size:18px">${t.emoji}</span>
      <span style="flex:1;font-size:12px;font-weight:${done?700:400};color:${done?G.text:G.muted}">${t.label}</span>
      <span style="font-size:16px">${done?"✅":"⬜"}</span>
    </div>`;
  }).join("");

  const updatedAt=new Date().toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});

  document.getElementById("app").innerHTML=`
  <div class="wrap">
    <div style="margin-bottom:20px">
      <div style="font-size:10px;letter-spacing:3px;color:${G.muted};font-weight:600;margin-bottom:4px">WEDDING DIET TRACKER</div>
      <div style="font-size:22px;font-weight:800">進捗ページ 📊</div>
      <div style="font-size:11px;color:${G.muted};margin-top:2px">最終更新: ${updatedAt}</div>
    </div>

    <!-- Level -->
    <div class="card">
      <div class="label">LEVEL</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,${G.priMid},${G.pri});display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0">${curLv.lv}</div>
        <div>
          <div style="font-size:16px;font-weight:800">${curLv.title}</div>
          <div style="font-size:11px;color:${G.muted};margin-top:2px">累計 ${totalXP.toLocaleString()} XP</div>
        </div>
      </div>
      <div style="background:${G.priXLight};border-radius:6px;height:8px;overflow:hidden">
        <div style="height:100%;width:${lvPct}%;background:linear-gradient(90deg,${G.priMid},${G.pri});border-radius:6px"></div>
      </div>
      ${nextLv?`<div style="font-size:9px;color:${G.muted};margin-top:4px;text-align:right">Lv${nextLv.lv}まで ${nextLv.xp-totalXP} XP</div>`:""}
    </div>

    <!-- Stats -->
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div class="card" style="flex:1;margin-bottom:0;padding:12px 10px;text-align:center">
        <div style="font-size:24px">🔥</div>
        <div style="font-size:18px;font-weight:800;color:${G.pri}">${streak}日</div>
        <div style="font-size:9px;color:${G.muted}">継続中</div>
      </div>
      <div class="card" style="flex:1;margin-bottom:0;padding:12px 10px;text-align:center">
        <div style="font-size:24px">${rank.emoji}</div>
        <div style="font-size:18px;font-weight:800;color:${rank.color}">${rank.name}</div>
        <div style="font-size:9px;color:${G.muted}">今週ランク</div>
      </div>
      <div class="card" style="flex:1;margin-bottom:0;padding:12px 10px;text-align:center">
        <div style="font-size:24px">💪</div>
        <div style="font-size:18px;font-weight:800;color:${G.pri}">${totalExDays}日</div>
        <div style="font-size:9px;color:${G.muted}">運動記録日数</div>
      </div>
    </div>

    <!-- Today -->
    <div class="card">
      <div class="label">TODAY — ${new Date().toLocaleDateString("ja-JP",{month:"numeric",day:"numeric",weekday:"short"})}</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
        <div style="position:relative;width:72px;height:72px;flex-shrink:0">
          <svg width="72" height="72" viewBox="0 0 72 72">
            <circle cx="36" cy="36" r="29" fill="none" stroke="${G.priLight}" stroke-width="6"/>
            <circle cx="36" cy="36" r="29" fill="none" stroke="${G.pri}" stroke-width="6"
              stroke-dasharray="${2*Math.PI*29}" stroke-dashoffset="${2*Math.PI*29*(1-todayPct/100)}"
              stroke-linecap="round" transform="rotate(-90 36 36)"/>
          </svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:800;color:${G.pri}">${todayPct}%</div>
        </div>
        <div>
          <div style="font-size:14px;font-weight:800;margin-bottom:3px">${todayPct===100?"完璧！満点達成🎉":todayPct>=80?"あと少し！":todayPct>=50?"いい調子！":"頑張ってる！"}</div>
          <div style="font-size:11px;color:${G.muted}">${doneNum}/${TASKS.length} タスク完了</div>
          ${mealR?`<div style="margin-top:4px;font-size:11px;color:${mealR.color};font-weight:600">${mealR.emoji} 食事: ${mealR.label}</div>`:""}
        </div>
      </div>
      ${taskItems}
    </div>

    <!-- Week -->
    <div class="card">
      <div class="label">今週の達成率 — 週平均 ${weekAvg}%</div>
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px;margin-bottom:4px">
        ${weekBars}
      </div>
    </div>

    <!-- Weight -->
    <div class="card">
      <div class="label">⚖️ 体重推移</div>
      ${latestW?`<div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1;background:${G.priXLight};border-radius:10px;padding:10px 12px;text-align:center">
          <div style="font-size:9px;color:${G.muted};margin-bottom:2px">最新</div>
          <div style="font-size:20px;font-weight:800;color:${G.pri}">${latestW}<span style="font-size:11px">kg</span></div>
        </div>
        ${wDiff!==null?`<div style="flex:1;background:${G.priXLight};border-radius:10px;padding:10px 12px;text-align:center">
          <div style="font-size:9px;color:${G.muted};margin-bottom:2px">記録開始から</div>
          <div style="font-size:20px;font-weight:800;color:${Number(wDiff)<=0?"#3a8a5a":"#c05030"}">${Number(wDiff)>0?"+":""}${wDiff}<span style="font-size:11px">kg</span></div>
        </div>`:""}
      </div>`:""}
      ${mkSVGLine(wHist,G.pri,90)}
    </div>

    <!-- Exercise -->
    <div class="card">
      <div class="label">💪 運動サマリー</div>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        <div style="flex:1;background:${G.priXLight};border-radius:10px;padding:10px 12px;text-align:center">
          <div style="font-size:9px;color:${G.muted};margin-bottom:2px">総運動日数</div>
          <div style="font-size:20px;font-weight:800;color:${G.pri}">${totalExDays}<span style="font-size:11px">日</span></div>
        </div>
        <div style="flex:1;background:${G.priXLight};border-radius:10px;padding:10px 12px;text-align:center">
          <div style="font-size:9px;color:${G.muted};margin-bottom:2px">総運動時間</div>
          <div style="font-size:20px;font-weight:800;color:${G.pri}">${totalExMin}<span style="font-size:11px">分</span></div>
        </div>
      </div>
      ${exLogs.length>0?`<div style="font-size:10px;color:${G.muted};font-weight:700;margin-bottom:8px">直近の運動</div>`:""}
      ${[...exLogs].reverse().slice(0,5).map(e=>`
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid ${G.border}">
          <div style="font-size:9px;color:${G.muted};width:38px;flex-shrink:0">${e.date.slice(5)}</div>
          <span style="font-size:14px">${e.emoji}</span>
          <div style="flex:1;font-size:12px">${e.type}</div>
          <div style="font-size:11px;font-weight:700;color:${G.pri}">${e.duration}分</div>
        </div>`).join("")}
    </div>

    <div style="text-align:center;font-size:11px;color:${G.muted};margin-top:8px">見てくれてありがとう 🌿<br/>応援よろしくね！</div>
  </div>`;
}

load().then(render).catch(e=>{
  document.getElementById("app").innerHTML=`<div class="loading"><div>😢</div><div>データの読み込みに失敗しました</div><div style="font-size:11px">${e.message}</div></div>`;
});
</script>
</body>
</html>
