// Linear regression for weight prediction
function linReg(points){
  const n=points.length;if(n<2)return null;
  const mx=points.reduce((s,p)=>s+p.x,0)/n;
  const my=points.reduce((s,p)=>s+p.y,0)/n;
  const num=points.reduce((s,p)=>s+(p.x-mx)*(p.y-my),0);
  const den=points.reduce((s,p)=>s+(p.x-mx)**2,0);
  if(den===0)return null;
  const slope=num/den,intercept=my-slope*mx;
  return{slope,intercept,predict:(x)=>slope*x+intercept};
}

// ── GitHub API ─────────────────────────────────────────────────────────────────
const ghH=(token)=>({"Authorization":`token ${token}`,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"});
function toBase64(str){const bytes=new TextEncoder().encode(str);let bin="";bytes.forEach(b=>bin+=String.fromCharCode(b));return btoa(bin);}
function fromBase64(b64){const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder().decode(bytes);}
async function ghFetch(token){
  const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,{headers:ghH(token)});
  if(!res.ok)throw new Error(res.status);
  const j=await res.json();LS.setSha(j.sha);
  return JSON.parse(fromBase64(j.content.replace(/\n/g,"")));
}
async function ghSave(token,data){
  const body={message:"update diet data",content:toBase64(JSON.stringify(data,null,2)),sha:LS.getSha()};
  const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,{method:"PUT",headers:ghH(token),body:JSON.stringify(body)});
  if(!res.ok)throw new Error(res.status);
  const j=await res.json();LS.setSha(j.content.sha);
}

// ── SVG Line Chart (supports prediction line) ──────────────────────────────────
function LineChart({data,predData,color=G.pri,predColor="#f4845f",height=100,goalY=null,goalColor="#c9a84c"}){
  if(!data||data.length<2)return<div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:G.muted,fontSize:11}}>2件以上記録するとグラフが表示されます</div>;
  const allVals=[...data.map(d=>d.v),...(predData||[]).map(d=>d.v),goalY!=null?goalY:null].filter(v=>v!=null);
  const mn=Math.min(...allVals)-0.5,mx=Math.max(...allVals)+0.5;
  const pad=28,W=320,H=height;
  const allPts=[...data,...(predData||[])];
  const totalLen=allPts.length;
  const px=(i)=>pad+(i/(totalLen-1))*(W-pad*2);
  const py=(v)=>H-pad-(((v-mn)/(mx-mn))*(H-pad*2));
  const pts=data.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
  const predPts=predData?predData.map((d,i)=>`${px(data.length-1+i)},${py(d.v)}`).join(" "):null;
  const area=`M${px(0)},${py(data[0].v)} `+data.map((d,i)=>`L${px(i)},${py(d.v)}`).join(" ")+` L${px(data.length-1)},${H} L${px(0)},${H} Z`;
  const step=Math.ceil(data.length/6);
  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block"}}>
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.18"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient>
    </defs>
    {goalY!=null&&<line x1={pad} y1={py(goalY)} x2={W-pad} y2={py(goalY)} stroke={goalColor} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.7"/>}
    {goalY!=null&&<text x={W-pad+2} y={py(goalY)+4} fontSize="8" fill={goalColor}>目標</text>}
    <path d={area} fill="url(#ag)"/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
    {predPts&&<polyline points={predPts} fill="none" stroke={predColor} strokeWidth="1.8" strokeDasharray="5,3" strokeLinejoin="round" strokeLinecap="round"/>}
    {data.map((d,i)=>(<g key={i}>
      <circle cx={px(i)} cy={py(d.v)} r="3" fill={color}/>
      {(i===0||i===data.length-1||i%step===0)&&<>
        <text x={px(i)} y={py(d.v)-7} textAnchor="middle" fontSize="8" fill={G.muted}>{d.v}</text>
        <text x={px(i)} y={H-1} textAnchor="middle" fontSize="7" fill={G.muted}>{d.label}</text>
      </>}
    </g>))}
    {predData&&predData.map((d,i)=>(<g key={"p"+i}>
      <circle cx={px(data.length-1+i)} cy={py(d.v)} r="2.5" fill={predColor} opacity="0.7"/>
      {i===predData.length-1&&<>
        <text x={px(data.length-1+i)} y={py(d.v)-7} textAnchor="middle" fontSize="8" fill={predColor}>{d.v.toFixed(1)}</text>
        <text x={px(data.length-1+i)} y={H-1} textAnchor="middle" fontSize="7" fill={predColor}>{d.label}</text>
      </>}
    </g>))}
  </svg>);
}

// ── SetupScreen ────────────────────────────────────────────────────────────────
function SetupScreen({onDone}){
  const [tok,setTok]=useState(""),[testing,setTesting]=useState(false),[err,setErr]=useState("");
  const submit=async()=>{
    if(!tok.trim())return;
    setTesting(true);setErr("");
    try{await ghFetch(tok.trim());LS.setToken(tok.trim());onDone(tok.trim());}
    catch{setErr("接続できませんでした。トークンを確認してください。");}
    finally{setTesting(false);}
  };
  return(<div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
    <div style={{fontSize:48,marginBottom:16}}>🌿</div>

    <div style={{width:"100%",maxWidth:360}}>
      <input type="password" placeholder="ghp_xxxxxxxxxxxx" value={tok} onChange={e=>setTok(e.target.value)}
        style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${G.border}`,fontSize:13,color:G.text,background:G.card,marginBottom:10}}/>
      {err&&<div style={{fontSize:11,color:"#c05030",marginBottom:10,textAlign:"center"}}>{err}</div>}
      <button onClick={submit} disabled={!tok||testing} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:testing?"#a0c8b0":G.pri,color:"#fff",fontSize:14,fontWeight:700,cursor:testing?"default":"pointer"}}>

    </div>
  </div>);
}

    ghFetch(token).then(d=>{setStore(d||blank());setLoading(false);}).catch(()=>{setSaveErr("読み込み失敗");setLoading(false);});
  },[token]);

  const wDate=toKey(addDays(nowJ(),wOffset));
  useEffect(()=>{
    const w=(store.weights||{})[wDate];
    if(w){setWInput(String(w));return;}
    const latest=Object.entries(store.weights||{}).sort(([a],[b])=>b.localeCompare(a)).find(([d])=>d<=wDate);
    setWInput(latest?String(latest[1]):"");
  },[wOffset,store.weights]);

  const persist=async(ns)=>{
    setSaving(true);setSaveErr("");
    try{await ghSave(token,ns);setSyncOk(true);setTimeout(()=>setSyncOk(false),2000);}
    catch{setSaveErr("保存失敗。再度お試しください。");}
    finally{setSaving(false);}
  };
  const update=(ns)=>{setStore(ns);persist(ns);};

  const tasks=store.tasks||{},weights=store.weights||{},meals=store.meals||{},exLogs=store.exercises||[],checked=tasks[key]||{};

  const streak=(()=>{let c=0;const now=new Date();for(let i=0;;i++){const d=new Date(now);d.setDate(d.getDate()-i);const p=TASKS.filter(t=>(tasks[toKey(d)]||{})[t.id]).reduce((s,t)=>s+t.points,0);if(p>0)c++;else break;}return c;})();
  const mult=sMult(streak);
  const todayBase=TASKS.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const mealR=MEAL_RATINGS.find(r=>r.id===meals[key]);
  const todayPts=Math.round((todayBase+(mealR?.pts||0))*mult);
  const todayPct=Math.round((todayBase/BASE_TOTAL)*100);
  const doneNum=TASKS.filter(t=>checked[t.id]).length;

  const totalXP=Object.entries(tasks).reduce((sum,[date,day])=>{
    const mp=(MEAL_RATINGS.find(r=>r.id===(meals[date]||0))?.pts)||0;
    return sum+TASKS.filter(t=>day[t.id]).reduce((s,t)=>s+t.points,0)+mp;
  },0);
  const {cur:curLv,next:nextLv}=getLevel(totalXP);
  const xpInLevel=totalXP-curLv.xp,xpNeeded=nextLv?nextLv.xp-curLv.xp:1;
  const lvPct=nextLv?Math.min(100,Math.round((xpInLevel/xpNeeded)*100)):100;

  useEffect(()=>{if(prevLvRef.current!==null&&curLv.lv>prevLvRef.current){setLvAnim(curLv);setTimeout(()=>setLvAnim(null),3000);}prevLvRef.current=curLv.lv;},[curLv.lv]);

  const weekDays=getWeekDays(),weekNum=getISOWeek(nowJ()),missions=getWeekMissions(weekNum);
  const weekDayData=weekDays.map(k=>tasks[k]||{});
  const weekPcts=weekDays.map(k=>{const d=tasks[k]||{};return Math.round((TASKS.filter(t=>d[t.id]).reduce((s,t)=>s+t.points,0)/BASE_TOTAL)*100);});
  const weekAvg=Math.round(weekPcts.reduce((s,v)=>s+v,0)/7);
  const rank=getRank(weekAvg),nextRank=getNextRank(rank);
  const missionsDone=missions.map(m=>m.check(weekDayData.map(d=>Object.fromEntries(TASKS.map(t=>[t.id,!!d[t.id]])))));

  // ── Period filter ─────────────────────────────────────────────────────────
  const periodDays=PERIODS.find(p=>p.id===period)?.days||null;
  const cutoff=periodDays?toKey(addDays(nowJ(),-periodDays)):null;

  const filteredWeights=useMemo(()=>
    Object.entries(weights).filter(([d,v])=>v!=null&&(!cutoff||d>=cutoff))
      .sort(([a],[b])=>a.localeCompare(b)),[weights,cutoff]);
  const filteredTasks=useMemo(()=>
    Object.entries(tasks).filter(([d])=>!cutoff||d>=cutoff),[tasks,cutoff]);
  const filteredExLogs=useMemo(()=>
    exLogs.filter(e=>!cutoff||e.date>=cutoff),[exLogs,cutoff]);

  // Weight history for chart
  const wHist=filteredWeights.slice(-60).map(([date,v])=>({label:date.slice(5),v,date}));
  const latestW=wHist.length?wHist[wHist.length-1].v:null;
  const firstW=wHist.length?wHist[0].v:null;
  const wDiff=latestW&&firstW?(latestW-firstW).toFixed(1):null;

  // ── Weight prediction (linear regression) ────────────────────────────────
  const {predData,predMsg}=useMemo(()=>{
    if(wHist.length<3)return{predData:null,predMsg:null};
    const startDate=new Date(wHist[0].date);
    const points=wHist.map(d=>({x:diffDays(startDate,new Date(d.date)),y:d.v}));
    const reg=linReg(points);
    if(!reg)return{predData:null,predMsg:null};

    const goalDate=settings.goalDate?new Date(settings.goalDate):null;
    const goalWeight=settings.goalWeight?parseFloat(settings.goalWeight):null;
    const today=nowJ();
    const daysFromStart=diffDays(startDate,today);

    // predict for goal date or 90 days ahead
    const targetDays=goalDate?diffDays(startDate,goalDate):daysFromStart+90;
    const predWeight=Math.round(reg.predict(targetDays)*10)/10;

    // build prediction line points (from last real data to target)
    const lastX=points[points.length-1].x;
    const steps=Math.min(Math.max(targetDays-lastX,1),90);
    const stepSize=Math.max(1,Math.floor(steps/6));
    const pred=[];
    for(let i=stepSize;i<=steps;i+=stepSize){
      const d=addDays(startDate,lastX+i);
      pred.push({label:toKey(d).slice(5),v:Math.round(reg.predict(lastX+i)*10)/10});
    }

    let msg="";
    if(goalDate&&goalWeight){
      const diff=(predWeight-goalWeight).toFixed(1);
      const daysLeft=diffDays(today,goalDate);
      if(Number(diff)<=0)msg=`このペースなら目標日に ${predWeight}kg → 目標達成できそう！🎉`;
      else msg=`このペースだと目標日に ${predWeight}kg（目標まであと ${diff}kg）`;
      msg+=` | 目標日まで${daysLeft}日`;
    } else if(goalDate){
      const daysLeft=diffDays(today,goalDate);
      msg=`このペースだと目標日(${daysLeft}日後)に ${predWeight}kg`;
    } else {
      const monthly=Math.round(reg.slope*30*10)/10;
      msg=`月約${monthly>0?"+":""}${monthly}kgのペース`;
    }
    return{predData:pred,predMsg:msg};
  },[wHist,settings]);

  // ── Day-of-week analysis ──────────────────────────────────────────────────
  const dowStats=useMemo(()=>{
    const counts=Array(7).fill(0),sums=Array(7).fill(0);
    filteredTasks.forEach(([date,day])=>{
      const d=new Date(date),dow=(d.getDay()+6)%7;
      const pct=Math.round((TASKS.filter(t=>day[t.id]).reduce((s,t)=>s+t.points,0)/BASE_TOTAL)*100);
      counts[dow]++;sums[dow]+=pct;
    });
    return DOW.map((label,i)=>({label,avg:counts[i]?Math.round(sums[i]/counts[i]):null,count:counts[i]}));
  },[filteredTasks]);

  // ── Exercise vs weight correlation ────────────────────────────────────────
  const correlationData=useMemo(()=>{
    const exByDay={};
    filteredExLogs.forEach(e=>{exByDay[e.date]=(exByDay[e.date]||0)+Number(e.duration||0);});
    const pairs=[];
    Object.entries(exByDay).forEach(([date,min])=>{
      const nextDay=toKey(addDays(new Date(date),1));
      const w0=weights[date],w1=weights[nextDay];
      if(w0!=null&&w1!=null)pairs.push({exMin:min,wChange:Math.round((w1-w0)*10)/10});
    });
    return pairs;
  },[filteredExLogs,weights]);

  const exByDay2={};exLogs.forEach(e=>{exByDay2[e.date]=(exByDay2[e.date]||0)+Number(e.duration||0);});
  const ex14=Array.from({length:14},(_,i)=>{const base=new Date(Date.now()-4*60*60*1000);base.setDate(base.getDate()-(13-i));const k=base.toISOString().slice(0,10);return{label:DOW[(base.getDay()+6)%7],v:exByDay2[k]||0,key:k};});
  const todayEx=exLogs.filter(e=>e.date===key);

  // handlers
  const toggle=(id)=>update({...store,tasks:{...tasks,[key]:{...checked,[id]:!checked[id]}}});
  const saveW=async()=>{const v=parseFloat(wInput);if(isNaN(v)||v<30||v>300)return;update({...store,weights:{...weights,[wDate]:v}});setWSaved(true);setTimeout(()=>setWSaved(false),1500);};
  const rateM=(id)=>update({...store,meals:{...meals,[key]:id}});
  const saveEx=async({type,duration})=>update({...store,exercises:[...exLogs,{id:Date.now(),date:key,type:type.label,emoji:type.emoji,duration}]});
  const delEx=(id)=>update({...store,exercises:exLogs.filter(e=>e.id!==id)});
  const saveSettings=()=>{const s={name:sName,goalDate:sGoalDate,goalWeight:sGoalWeight};setSettings(s);LS.setSettings(s);setShowSettings(false);};

  const C=(ex={})=>({background:G.card,borderRadius:14,padding:"14px",boxShadow:"0 1px 10px rgba(40,90,60,0.08)",border:`1px solid ${G.border}`,...ex});
  const TABS=[["today","今日"],["meal","食事"],["record","体重・運動"],["analysis","分析"],["progress","進捗"]];
  const displayName=settings.name||"新郎";

  if(!token)return<SetupScreen onDone={(t)=>{setToken(t);setLoading(true);}}/>;
  if(loading)return(<div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}><div style={{fontSize:36}} className="spin">🌿</div><div style={{fontSize:13,color:G.muted}}>データを読み込み中...</div></div>);

  // Settings screen
  if(showSettings){
    const s=settings;
    return(<div style={{minHeight:"100vh",background:G.bg,padding:"24px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <button onClick={()=>setShowSettings(false)} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:G.pri}}>←</button>
        <div style={{fontSize:16,fontWeight:800}}>設定</div>
      </div>

      {/* Personal settings */}
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:12}}>👤 プロフィール</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <div style={{fontSize:11,color:G.muted,marginBottom:4}}>名前</div>
            <input placeholder="例: 太郎" defaultValue={s.name||""} onChange={e=>setSName(e.target.value)}
              style={{width:"100%",padding:"9px 12px",borderRadius:9,border:`1.5px solid ${G.border}`,fontSize:13,color:G.text,background:G.bg}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:G.muted,marginBottom:4}}>目標日（例: 結婚式）</div>
            <input type="date" defaultValue={s.goalDate||""} onChange={e=>setSGoalDate(e.target.value)}
              style={{width:"100%",padding:"9px 12px",borderRadius:9,border:`1.5px solid ${G.border}`,fontSize:13,color:G.text,background:G.bg}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:G.muted,marginBottom:4}}>目標体重 (kg)</div>
            <input type="number" step="0.1" placeholder="例: 68.0" defaultValue={s.goalWeight||""} onChange={e=>setSGoalWeight(e.target.value)}
              style={{width:"100%",padding:"9px 12px",borderRadius:9,border:`1.5px solid ${G.border}`,fontSize:13,color:G.text,background:G.bg}}/>
          </div>
          <button onClick={saveSettings} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:G.pri,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>保存する</button>
        </div>
      </div>

      {/* Token */}
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:8}}>🔑 GitHub Token</div>
        <div style={{fontSize:11,color:G.muted,marginBottom:10}}>現在: {LS.getToken().slice(0,8)}...</div>
        <button onClick={()=>{LS.setToken("");setToken("");setShowSettings(false);}} style={{width:"100%",padding:"10px",borderRadius:9,border:`1.5px solid #c05030`,background:"#fff5f5",color:"#c05030",fontSize:13,fontWeight:700,cursor:"pointer"}}>トークンをリセットして再設定</button>
      </div>

      {/* View URL */}
      <div style={{...C()}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:8}}>📊 観覧ページURL</div>
        <div style={{fontSize:11,color:G.muted,marginBottom:8,lineHeight:1.6}}>このURLを共有すると進捗を見てもらえます：</div>
        <div style={{padding:"10px 12px",background:G.priXLight,borderRadius:9,fontSize:11,color:G.pri,fontWeight:600,wordBreak:"break-all"}}>https://{OWNER}.github.io/{REPO}/view.html</div>
      </div>
    </div>);
  }

  return(<div style={{minHeight:"100vh",background:G.bg,padding:"20px 16px 40px",maxWidth:480,margin:"0 auto",color:G.text}}>

    {lvAnim&&<div style={{position:"fixed",top:24,left:"50%",background:G.pri,color:"#fff",padding:"12px 24px",borderRadius:20,fontSize:13,fontWeight:800,zIndex:9999,boxShadow:"0 6px 24px rgba(40,130,80,0.45)",animation:"fadeUp 3s ease forwards",whiteSpace:"nowrap",pointerEvents:"none"}}>🎉 LEVEL UP! Lv{lvAnim.lv}「{lvAnim.title}」</div>}

    {(saving||syncOk||saveErr)&&<div style={{position:"fixed",top:16,right:16,zIndex:999,padding:"6px 12px",borderRadius:20,background:saveErr?"#c05030":syncOk?"#3a8a5a":"#6a8a6a",color:"#fff",fontSize:11,fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
      {saving?"☁️ 保存中...":syncOk?"✓ 保存完了":"⚠️ "+saveErr}
    </div>}

    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <div style={{fontSize:10,letterSpacing:3,color:G.muted,fontWeight:600,marginBottom:2}}>DIET TRACKER</div>
        <div style={{fontSize:20,fontWeight:800}}>理想の{displayName}へ 🌿</div>
        <div style={{fontSize:11,color:G.muted,marginTop:2}}>{new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}
          {settings.goalDate&&<span style={{marginLeft:8,color:G.pri,fontWeight:600}}>目標日まで{diffDays(new Date(),new Date(settings.goalDate))}日</span>}
        </div>
      </div>
      <button onClick={()=>{const s=LS.getSettings();setSName(s.name||"");setSGoalDate(s.goalDate||"");setSGoalWeight(s.goalWeight||"");setShowSettings(true);}} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:G.muted,padding:"4px"}}>⚙️</button>
    </div>

    {/* Level */}
    <div style={{...C({marginBottom:12,padding:"11px 14px"})}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${G.priMid},${G.pri})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff"}}>{curLv.lv}</div>
          <div style={{fontSize:13,fontWeight:800}}>{curLv.title}</div>
        </div>
        <div style={{fontSize:11,color:G.pri,fontWeight:700}}>{totalXP.toLocaleString()} XP</div>
      </div>
      <div style={{background:G.priXLight,borderRadius:6,height:6,overflow:"hidden"}}><div style={{height:"100%",width:`${lvPct}%`,background:`linear-gradient(90deg,${G.priMid},${G.pri})`,borderRadius:6,transition:"width 0.6s ease"}}/></div>
      {nextLv&&<div style={{fontSize:9,color:G.muted,marginTop:3,textAlign:"right"}}>Lv{nextLv.lv}まで {nextLv.xp-totalXP} XP</div>}
    </div>

    {/* Stats */}
    <div style={{display:"flex",gap:7,marginBottom:12}}>
      {[{icon:"🔥",val:`${streak}日`,label:"継続中",sub:mult>1?`×${mult}倍中`:null},{icon:rank.emoji,val:rank.name,label:"今週ランク",col:rank.color},{icon:"⚡",val:`${todayPts}pt`,label:"今日のXP"}].map((s,i)=>(
        <div key={i} style={{...C({flex:1,padding:"9px 10px"})}}>
          <div style={{fontSize:17}}>{s.icon}</div>
          <div style={{fontSize:13,fontWeight:800,color:s.col||G.pri,marginTop:2}}>{s.val}</div>
          <div style={{fontSize:9,color:G.muted,marginTop:1}}>{s.label}</div>
          {s.sub&&<div style={{fontSize:8,color:G.priMid,fontWeight:600,marginTop:1}}>{s.sub}</div>}
        </div>
      ))}
    </div>

    {/* Tabs */}
    <div style={{display:"flex",gap:2,marginBottom:14,background:G.priXLight,borderRadius:10,padding:3}}>
      {TABS.map(([id,label])=>(<button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"7px 1px",borderRadius:8,border:"none",background:tab===id?G.card:"transparent",color:tab===id?G.pri:G.muted,fontWeight:tab===id?800:500,fontSize:9,cursor:"pointer",boxShadow:tab===id?"0 1px 4px rgba(40,90,60,0.1)":"none",transition:"all 0.15s"}}>{label}</button>))}
    </div>

    {/* ══ TODAY ══════════════════════════════════════════════════════════════ */}
    {tab==="today"&&<>
      <div style={{...C({display:"flex",alignItems:"center",gap:16,marginBottom:12})}}>
        <div style={{position:"relative",width:70,height:70,flexShrink:0}}>
          <svg width="70" height="70" viewBox="0 0 70 70">
            <circle cx="35" cy="35" r="28" fill="none" stroke={G.priLight} strokeWidth="6"/>
            <circle cx="35" cy="35" r="28" fill="none" stroke={G.pri} strokeWidth="6" strokeDasharray={`${2*Math.PI*28}`} strokeDashoffset={`${2*Math.PI*28*(1-todayPct/100)}`} strokeLinecap="round" transform="rotate(-90 35 35)" style={{transition:"stroke-dashoffset 0.5s ease"}}/>
          </svg>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:13,fontWeight:800,color:G.pri}}>{todayPct}%</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:800,marginBottom:3}}>{todayPct===100?"完璧！満点達成🎉":todayPct>=80?"あと少し！":todayPct>=50?"いい調子！":"今日も頑張ろう！"}</div>
          <div style={{fontSize:11,color:G.muted}}>{doneNum}/{TASKS.length} タスク完了</div>
          {mealR&&<div style={{marginTop:4,fontSize:11,color:mealR.color,fontWeight:600}}>{mealR.emoji} 食事: {mealR.label}</div>}
          {mult>1&&<div style={{marginTop:5,fontSize:10,background:G.priXLight,display:"inline-block",padding:"2px 8px",borderRadius:10,color:G.pri,fontWeight:700}}>🔥 ×{mult}倍ボーナス中</div>}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {TASKS.map(task=>{
          const done=!!checked[task.id],bpts=Math.round(task.points*mult),isB=task.id==="breakfast";
          return(<button key={task.id} onClick={()=>toggle(task.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,border:`1.5px solid ${done?G.pri:isB&&!done?"#e0a040":G.border}`,background:done?`${G.pri}0e`:isB&&!done?"#fffbf0":G.card,cursor:"pointer",textAlign:"left",transition:"all 0.18s"}}>
            <span style={{fontSize:20}}>{task.emoji}</span>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:done?700:500,color:done?G.text:G.muted}}>{task.label}</div>{isB&&!done&&<div style={{fontSize:9,color:"#c08020",marginTop:2}}>{task.note}</div>}</div>
            <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:11,fontWeight:700,color:done?G.pri:isB?"#c08020":G.border}}>+{bpts}pt</div>{mult>1&&<div style={{fontSize:8,color:G.priMid}}>base {task.points}</div>}</div>
            <div style={{width:20,height:20,borderRadius:"50%",background:done?G.pri:G.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0,transition:"background 0.18s"}}>{done?"✓":""}</div>
          </button>);
        })}
      </div>
      <div style={{...C({marginTop:12,padding:"11px 14px"}),display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setTab("meal")}>
        <span style={{fontSize:22}}>{mealR?mealR.emoji:"🍽️"}</span>
        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:G.text}}>{mealR?"食事記録: "+mealR.label:"食事の記録をつける"}</div><div style={{fontSize:10,color:G.muted,marginTop:1}}>{mealR?`+${mealR.pts}pt獲得`:"「食事」タブで記録 →"}</div></div>
      </div>
    </>}

    {/* ══ MEAL ═══════════════════════════════════════════════════════════════ */}
    {tab==="meal"&&<>
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>🍽️ 今日の食事</div>
        <div style={{fontSize:11,color:G.muted,marginBottom:14}}>今日の食事全体を振り返って選んでください</div>
        <MealRater current={meals[key]} onRate={rateM}/>
        {meals[key]&&<div style={{marginTop:12,padding:"10px 12px",background:G.priXLight,borderRadius:10,fontSize:11,color:G.pri,fontWeight:600,textAlign:"center"}}>✅ 今日の食事を記録しました</div>}
      </div>
      {Object.keys(meals).length>0&&<div style={{...C()}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>食事履歴（直近7日）</div>
        <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
          {Array.from({length:7},(_,i)=>{const d=nowJ();d.setDate(d.getDate()-(6-i));const k=toKey(d),r=MEAL_RATINGS.find(x=>x.id===meals[k]);return(<div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:18,opacity:r?1:0.2}}>{r?r.emoji:"・"}</span><div style={{fontSize:8,color:k===key?G.pri:G.muted,fontWeight:k===key?700:400}}>{DOW[(d.getDay()+6)%7]}</div></div>);})}
        </div>
      </div>}
    </>}

    {/* ══ RECORD ══════════════════════════════════════════════════════════════ */}
    {tab==="record"&&<>
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:12}}>⚖️ 体重記録</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,background:G.priXLight,borderRadius:10,padding:"8px 12px"}}>
          <button onClick={()=>setWOffset(wOffset-1)} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:G.pri,padding:"0 4px"}}>‹</button>
          <div style={{fontSize:12,fontWeight:700,color:G.text}}>{wOffset===0?"今日":wOffset===-1?"昨日":addDays(new Date(),wOffset).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}</div>
          <button onClick={()=>setWOffset(Math.min(0,wOffset+1))} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:wOffset===0?G.border:G.pri,padding:"0 4px"}} disabled={wOffset===0}>›</button>
        </div>
        {latestW&&<div style={{display:"flex",gap:10,marginBottom:12}}>
          <div style={{flex:1,background:G.priXLight,borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:9,color:G.muted,marginBottom:2}}>最新</div><div style={{fontSize:20,fontWeight:800,color:G.pri}}>{latestW}<span style={{fontSize:11}}>kg</span></div></div>
          {wDiff!==null&&<div style={{flex:1,background:G.priXLight,borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:9,color:G.muted,marginBottom:2}}>記録開始から</div><div style={{fontSize:20,fontWeight:800,color:Number(wDiff)<=0?"#3a8a5a":"#c05030"}}>{Number(wDiff)>0?"+":""}{wDiff}<span style={{fontSize:11}}>kg</span></div></div>}
          {settings.goalWeight&&latestW&&<div style={{flex:1,background:G.priXLight,borderRadius:10,padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:9,color:G.muted,marginBottom:2}}>目標まで</div><div style={{fontSize:20,fontWeight:800,color:G.pri}}>{(latestW-parseFloat(settings.goalWeight)).toFixed(1)}<span style={{fontSize:11}}>kg</span></div></div>}
        </div>}
        <LineChart data={wHist} color={G.pri} height={90} goalY={settings.goalWeight?parseFloat(settings.goalWeight):null}/>
        <div style={{marginTop:12}}><WeightInput value={wInput} onChange={setWInput} onSave={saveW} saved={wSaved} saving={saving}/></div>
      </div>

      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:12}}>💪 運動記録（今日）</div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:G.muted,marginBottom:6}}>直近14日の運動時間（分）</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:56}}>
            {ex14.map((d,i)=>{const isT=d.key===key,mV=Math.max(...ex14.map(x=>x.v),1);return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>{d.v>0&&<div style={{fontSize:7,color:G.pri,fontWeight:600}}>{d.v}</div>}<div style={{width:"100%",height:Math.max(3,(d.v/mV)*44),background:isT?G.pri:d.v>0?G.priLight:G.border,borderRadius:4,transition:"height 0.3s"}}/><div style={{fontSize:7,color:isT?G.pri:G.muted,fontWeight:isT?700:400}}>{d.label}</div></div>);})}
          </div>
        </div>
        <ExerciseLogger onSave={saveEx} saving={saving}/>
        {todayEx.length>0&&<div style={{marginTop:14}}>
          <div style={{fontSize:10,color:G.muted,fontWeight:700,marginBottom:7}}>今日の記録</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {todayEx.map(e=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:10,background:G.priXLight,borderRadius:9,padding:"8px 12px"}}>
              <span style={{fontSize:18}}>{e.emoji}</span>
              <div style={{flex:1}}><span style={{fontSize:12,fontWeight:700,color:G.text}}>{e.type}</span><span style={{fontSize:12,color:G.pri,fontWeight:700,marginLeft:6}}>{e.duration}分</span></div>
              <button onClick={()=>delEx(e.id)} style={{border:"none",background:"none",color:G.muted,fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
            </div>))}
          </div>
        </div>}
      </div>

      {exLogs.length>0&&<div style={{...C()}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>運動履歴（直近10件）</div>
        <div style={{display:"flex",flexDirection:"column"}}>
          {[...exLogs].reverse().slice(0,10).map((e,i,arr)=>(<div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<arr.length-1?`1px solid ${G.border}`:"none"}}>
            <div style={{fontSize:9,color:G.muted,flexShrink:0,width:38}}>{e.date.slice(5)}</div>
            <span style={{fontSize:14}}>{e.emoji}</span>
            <div style={{flex:1,fontSize:12,color:G.text}}>{e.type}</div>
            <div style={{fontSize:11,fontWeight:700,color:G.pri,flexShrink:0}}>{e.duration}分</div>
          </div>))}
        </div>
      </div>}
    </>}

    {/* ══ ANALYSIS ═══════════════════════════════════════════════════════════ */}
    {tab==="analysis"&&<>
      {/* Period filter */}
      <div style={{...C({marginBottom:14,padding:"10px 12px"})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:8}}>期間</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {PERIODS.map(p=>{const sel=period===p.id;return(
            <button key={p.id} onClick={()=>setPeriod(p.id)} style={{padding:"5px 10px",borderRadius:8,border:`1.5px solid ${sel?G.pri:G.border}`,background:sel?G.priXLight:G.card,fontSize:11,fontWeight:sel?700:500,color:sel?G.pri:G.muted,cursor:"pointer",transition:"all 0.15s"}}>{p.label}</button>
          );})}
        </div>
      </div>

      {/* Weight prediction */}
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>⚖️ 体重推移・予測</div>
        {predMsg&&<div style={{fontSize:11,color:G.pri,fontWeight:600,marginBottom:10,padding:"8px 10px",background:G.priXLight,borderRadius:8,lineHeight:1.5}}>{predMsg}</div>}
        {wHist.length>=2?
          <LineChart data={wHist} predData={predData} color={G.pri} predColor="#f4845f" height={110} goalY={settings.goalWeight?parseFloat(settings.goalWeight):null}/>
          :<div style={{textAlign:"center",color:G.muted,fontSize:11,padding:"20px 0"}}>体重を2件以上記録するとグラフと予測が表示されます</div>
        }
        {predData&&<div style={{display:"flex",alignItems:"center",gap:12,marginTop:8,fontSize:10,color:G.muted}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:16,height:2,background:G.pri,borderRadius:1}}/><span>実績</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:16,height:2,background:"#f4845f",borderRadius:1,borderTop:"1px dashed #f4845f"}}/><span>予測</span></div>
          {settings.goalWeight&&<div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:16,height:1,background:"#c9a84c",borderRadius:1}}/><span>目標</span></div>}
        </div>}
      </div>

      {/* Day-of-week analysis */}
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:12}}>📅 曜日別達成率</div>
        <div style={{display:"flex",gap:5,alignItems:"flex-end",height:80}}>
          {dowStats.map((d,i)=>{
            const maxAvg=Math.max(...dowStats.map(x=>x.avg||0),1);
            const isToday=(nowJ().getDay()+6)%7===i;
            return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              {d.avg!=null&&<div style={{fontSize:8,color:isToday?G.pri:G.muted,fontWeight:600}}>{d.avg}%</div>}
              <div style={{width:"100%",height:d.avg!=null?Math.max(4,(d.avg/maxAvg)*56):4,background:isToday?G.pri:d.avg!=null?G.priLight:G.border,borderRadius:4,opacity:d.avg!=null?1:0.3,transition:"height 0.4s"}}/>
              <div style={{fontSize:9,color:isToday?G.pri:G.muted,fontWeight:isToday?700:400}}>{d.label}</div>
              {d.count>0&&<div style={{fontSize:7,color:G.muted}}>{d.count}日</div>}
            </div>);
          })}
        </div>
        {(()=>{
          const valid=dowStats.filter(d=>d.avg!=null);
          if(valid.length===0)return null;
          const best=valid.reduce((a,b)=>a.avg>b.avg?a:b);
          const worst=valid.reduce((a,b)=>a.avg<b.avg?a:b);
          return(<div style={{display:"flex",gap:8,marginTop:10}}>
            <div style={{flex:1,background:G.priXLight,borderRadius:9,padding:"8px 10px",textAlign:"center"}}>
              <div style={{fontSize:9,color:G.muted}}>一番強い曜日</div>
              <div style={{fontSize:14,fontWeight:800,color:G.pri}}>{best.label}曜日</div>
              <div style={{fontSize:10,color:G.muted}}>{best.avg}%</div>
            </div>
            <div style={{flex:1,background:"#fff5f5",borderRadius:9,padding:"8px 10px",textAlign:"center",border:`1px solid #f0d0d0`}}>
              <div style={{fontSize:9,color:G.muted}}>要注意の曜日</div>
              <div style={{fontSize:14,fontWeight:800,color:"#c05030"}}>{worst.label}曜日</div>
              <div style={{fontSize:10,color:G.muted}}>{worst.avg}%</div>
            </div>
          </div>);
        })()}
      </div>

      {/* Exercise vs weight correlation */}
      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>💪 運動と体重変化の相関</div>
        <div style={{fontSize:11,color:G.muted,marginBottom:12}}>運動した翌日の体重変化を集計</div>
        {correlationData.length>=3?(()=>{
          const noEx=correlationData.filter(p=>p.exMin===0);
          const withEx=correlationData.filter(p=>p.exMin>0);
          const avgNoEx=noEx.length?Math.round(noEx.reduce((s,p)=>s+p.wChange,0)/noEx.length*100)/100:null;
          const avgWithEx=withEx.length?Math.round(withEx.reduce((s,p)=>s+p.wChange,0)/withEx.length*100)/100:null;
          const lightEx=withEx.filter(p=>p.exMin<=30);
          const heavyEx=withEx.filter(p=>p.exMin>30);
          const avgLight=lightEx.length?Math.round(lightEx.reduce((s,p)=>s+p.wChange,0)/lightEx.length*100)/100:null;
          const avgHeavy=heavyEx.length?Math.round(heavyEx.reduce((s,p)=>s+p.wChange,0)/heavyEx.length*100)/100:null;
          const fmt=(v)=>v==null?"データ不足":v>0?`+${v}kg`:`${v}kg`;
          const col=(v)=>v==null?G.muted:v<=0?"#3a8a5a":"#c05030";
          return(<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {[
                {label:"運動なしの翌日",val:avgNoEx,n:noEx.length},
                {label:"運動ありの翌日",val:avgWithEx,n:withEx.length},
                {label:"軽め（〜30分）の翌日",val:avgLight,n:lightEx.length},
                {label:"しっかり（30分超）の翌日",val:avgHeavy,n:heavyEx.length},
              ].map((item,i)=>(
                <div key={i} style={{background:G.priXLight,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:G.muted,marginBottom:4,lineHeight:1.4}}>{item.label}</div>
                  <div style={{fontSize:16,fontWeight:800,color:col(item.val)}}>{fmt(item.val)}</div>
                  <div style={{fontSize:8,color:G.muted,marginTop:2}}>{item.n}日分</div>
                </div>
              ))}
            </div>
            {avgWithEx!=null&&avgNoEx!=null&&<div style={{padding:"8px 12px",background:avgWithEx<avgNoEx?G.priXLight:"#fff5f5",borderRadius:9,fontSize:11,fontWeight:600,color:avgWithEx<avgNoEx?G.pri:"#c05030",textAlign:"center"}}>
              {avgWithEx<avgNoEx?`運動した日は翌日が平均${Math.abs(Math.round((avgWithEx-avgNoEx)*100)/100)}kg少ない！💪`:"もっと運動の効果が出てくるはず、続けよう🌱"}
            </div>}
          </>);
        })():<div style={{textAlign:"center",color:G.muted,fontSize:11,padding:"20px 0"}}>体重と運動を数日記録すると相関が表示されます</div>}
      </div>
    </>}

    {/* ══ PROGRESS ════════════════════════════════════════════════════════════ */}
    {tab==="progress"&&<>
      <div style={{...C({marginBottom:14,background:`linear-gradient(135deg,${rank.color}15,${G.card})`,borderColor:rank.color+"40"})}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>今週のランク</div><div style={{fontSize:22,fontWeight:800,color:rank.color}}>{rank.emoji} {rank.name}</div><div style={{fontSize:11,color:G.muted,marginTop:2}}>週平均達成率: <b>{weekAvg}%</b></div></div>
          <div style={{textAlign:"right"}}>{nextRank?(<><div style={{fontSize:9,color:G.muted}}>次のランクまで</div><div style={{fontSize:20,fontWeight:800,color:nextRank.color}}>{nextRank.min-weekAvg}%</div><div style={{fontSize:9,color:G.muted}}>{nextRank.emoji} {nextRank.name}</div></>):<div style={{fontSize:12,fontWeight:800,color:G.pri}}>最高ランク！💍</div>}</div>
        </div>
      </div>

      <div style={{...C({marginBottom:14})}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>今週の達成率</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:62}}>
          {weekDays.map((k,i)=>{const isT=k===todayKey(),isP=k<todayKey();return(<div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:8,color:weekPcts[i]>0?G.pri:G.muted,fontWeight:600}}>{weekPcts[i]>0?weekPcts[i]+"%":""}</div><div style={{width:"100%",height:Math.max(3,weekPcts[i]*0.52),background:isT?G.pri:weekPcts[i]>0?G.priLight:G.border,borderRadius:4,opacity:!isP&&!isT?0.3:1,transition:"height 0.4s"}}/><div style={{fontSize:9,color:isT?G.pri:G.muted,fontWeight:isT?700:400}}>{DOW[i]}</div></div>);})}
        </div>
      </div>

      <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>今週のミッション</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {missions.map((m,i)=>{const done=missionsDone[i];return(<div key={m.id} style={{...C({padding:"12px 14px",borderColor:done?G.pri:G.border,background:done?`${G.pri}0d`:G.card})}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>{done?"🏆":"🎯"}</span><div style={{flex:1}}><div style={{fontSize:12,fontWeight:done?800:500,color:done?G.text:G.muted}}>{m.label}</div><div style={{fontSize:10,color:done?G.pri:G.muted,marginTop:2,fontWeight:600}}>{done?"✅ クリア！+50XP":"未達成"}</div></div></div>
        </div>);})}
      </div>

      <div style={{...C()}}>
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>全レベルロードマップ</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {LEVELS.map(lv=>{const u=totalXP>=lv.xp,iC=lv.lv===curLv.lv;return(<div key={lv.lv} style={{display:"flex",alignItems:"center",gap:10,opacity:u?1:0.4,padding:"6px 10px",borderRadius:8,background:iC?G.priXLight:"transparent",border:iC?`1px solid ${G.priLight}`:"1px solid transparent"}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:u?G.pri:G.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>{lv.lv}</div>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:iC?800:500,color:iC?G.text:G.muted}}>{lv.title}</div><div style={{fontSize:9,color:G.muted}}>{lv.xp.toLocaleString()} XP〜</div></div>
            {iC&&<span style={{fontSize:10,color:G.pri,fontWeight:700}}>← 現在</span>}
            {u&&!iC&&<span style={{fontSize:13}}>✅</span>}
          </div>);})}
        </div>
      </div>
    </>}

    <div style={{textAlign:"center",marginTop:24,fontSize:10,color:G.muted}}>毎日少しずつ、必ず変わる 🌿</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
