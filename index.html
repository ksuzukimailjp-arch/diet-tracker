<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="新郎Diet"/>
<meta name="theme-color" content="#3a8a5a"/>
<title>新郎ダイエットトラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f2f6f2;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#1a2e1a;-webkit-font-smoothing:antialiased}
button,input{font-family:inherit}
input:focus{outline:none;border-color:#3a8a5a!important}
::-webkit-scrollbar{display:none}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 48px;min-height:100vh}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 10px rgba(40,90,60,0.08);border:1px solid #d4e8d4;margin-bottom:12px}
.lbl{font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:#edf7ed;border-radius:10px;padding:3px}
.tab{flex:1;padding:7px 2px;border-radius:8px;border:none;background:transparent;color:#6a8a6a;font-weight:500;font-size:10px;cursor:pointer}
.tab.on{background:#fff;color:#3a8a5a;font-weight:800;box-shadow:0 1px 4px rgba(40,90,60,0.1)}
.pbtn{border:none;background:#3a8a5a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;border-radius:9px;padding:10px 16px;width:100%;margin-top:8px}
.pbtn:disabled{background:#c8e6c9;cursor:default}
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.scard{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(40,90,60,0.12)}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:20px;height:20px;border:3px solid #c8e6c9;border-top:3px solid #3a8a5a;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes fadeUp{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.toast{position:fixed;top:24px;left:50%;background:#3a8a5a;color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;font-weight:800;z-index:9999;box-shadow:0 6px 24px rgba(40,130,80,0.45);animation:fadeUp 3s ease forwards;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>
<div id="root"></div>
<script>
var GH_REPO="ksuzukimailjp-arch/diet-tracker";
var GH_FILE="data.json";
var GH_API="https://api.github.com/repos/"+GH_REPO+"/contents/"+GH_FILE;
var LS_TOKEN="gh_token";
var LS_SHA="gh_sha";

function getToken(){return localStorage.getItem(LS_TOKEN)||"";}
function getSha(){return localStorage.getItem(LS_SHA)||"";}
function setToken(t){localStorage.setItem(LS_TOKEN,t);}
function setSha(s){localStorage.setItem(LS_SHA,s);}

function ghFetch(){
  return fetch(GH_API,{headers:{Authorization:"token "+getToken(),Accept:"application/vnd.github.v3+json"}})
    .then(function(r){if(!r.ok)throw new Error("fail");return r.json();})
    .then(function(j){setSha(j.sha);return JSON.parse(atob(j.content.replace(/\n/g,"")));});
}
function ghSave(store){
  var content=btoa(unescape(encodeURIComponent(JSON.stringify(store,null,2))));
  return fetch(GH_API,{method:"PUT",headers:{Authorization:"token "+getToken(),Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify({message:"update data",content:content,sha:getSha()})})
    .then(function(r){if(!r.ok)throw new Error("fail");return r.json();})
    .then(function(j){setSha(j.content.sha);});
}

var TASKS=[
  {id:"breakfast",emoji:"🍳",label:"朝ごはんを食べた",points:20,note:"代謝UP・食べすぎ防止"},
  {id:"water",emoji:"💧",label:"水を1.5L飲む",points:10},
  {id:"vegFirst",emoji:"🥗",label:"野菜から先に食べた",points:10},
  {id:"noLateEat",emoji:"🌙",label:"21時以降食べなかった",points:15},
  {id:"snack",emoji:"🍪",label:"間食を我慢 or 半分に",points:15},
  {id:"walk",emoji:"🚶",label:"15〜30分歩いた",points:20},
  {id:"exercise",emoji:"💪",label:"筋トレをした",points:25},
  {id:"weigh",emoji:"⚖️",label:"体重を記録した",points:5}
];
var BASE_TOTAL=TASKS.reduce(function(s,t){return s+t.points;},0);
function streakMult(s){return s>=30?2.0:s>=7?1.5:s>=3?1.2:1.0;}

var LEVELS=[
  {lv:1,xp:0,title:"見習い新郎"},{lv:2,xp:200,title:"意識高め新郎"},
  {lv:3,xp:500,title:"ダイエット戦士"},{lv:4,xp:900,title:"習慣マスター"},
  {lv:5,xp:1400,title:"鋼の意志"},{lv:6,xp:2000,title:"体型番長"},
  {lv:7,xp:2700,title:"スーツの申し子"},{lv:8,xp:3500,title:"伝説の花婿候補"},
  {lv:9,xp:4400,title:"ウェディング覇者"},{lv:10,xp:5500,title:"完璧な新郎 💍"}
];
function getLevel(xp){
  var cur=LEVELS[0],next=LEVELS[1];
  for(var i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){cur=LEVELS[i];next=LEVELS[i+1]||null;break;}}
  return{cur:cur,next:next};
}

var ALL_MISSIONS=[
  {id:"m1",label:"今週、朝ごはんを5日以上食べる",chk:function(d){return d.filter(function(x){return x.breakfast;}).length>=5;}},
  {id:"m2",label:"今週、筋トレを4回以上する",chk:function(d){return d.filter(function(x){return x.exercise;}).length>=4;}},
  {id:"m3",label:"今週、毎日水1.5Lを達成する",chk:function(d){return d.every(function(x){return x.water;});}},
  {id:"m4",label:"今週、間食ゼロの日を3日作る",chk:function(d){return d.filter(function(x){return x.snack;}).length>=3;}},
  {id:"m5",label:"今週、21時以降食べない日を5日作る",chk:function(d){return d.filter(function(x){return x.noLateEat;}).length>=5;}},
  {id:"m6",label:"今週、毎日体重を記録する",chk:function(d){return d.every(function(x){return x.weigh;});}},
  {id:"m7",label:"今週、ウォーキングを5回以上する",chk:function(d){return d.filter(function(x){return x.walk;}).length>=5;}}
];
function getWeekMissions(w){return[ALL_MISSIONS[w%ALL_MISSIONS.length],ALL_MISSIONS[(w+1)%ALL_MISSIONS.length]];}

var RANKS=[
  {name:"Bronze",min:0,color:"#a06840",emoji:"🥉"},
  {name:"Silver",min:40,color:"#8a9aaa",emoji:"🥈"},
  {name:"Gold",min:65,color:"#c9a84c",emoji:"🥇"},
  {name:"Wedding",min:85,color:"#3a8a5a",emoji:"💍"}
];
function getRank(p){var r=RANKS[0];for(var i=RANKS.length-1;i>=0;i--){if(p>=RANKS[i].min){r=RANKS[i];break;}}return r;}
function getNextRank(r){var i=RANKS.findIndex(function(x){return x.name===r.name;});return RANKS[i+1]||null;}

var MEAL_RATINGS=[
  {id:5,emoji:"😇",label:"完璧",note:"朝昼夜◎・間食なし",color:"#3a8a5a",pts:20},
  {id:4,emoji:"🙂",label:"良い",note:"3食・少し間食あり",color:"#5aaa78",pts:15},
  {id:3,emoji:"😐",label:"普通",note:"1食抜き or 間食多め",color:"#c9a84c",pts:8},
  {id:2,emoji:"😓",label:"よくない",note:"2食抜き or 夜遅食",color:"#d08040",pts:3},
  {id:1,emoji:"🍕",label:"ダメ",note:"食べすぎ・反省あり",color:"#c05030",pts:0}
];

var EX_TYPES=[
  {id:"strength",emoji:"💪",label:"筋トレ"},
  {id:"walk",emoji:"🚶",label:"ウォーク"},
  {id:"run",emoji:"🏃",label:"ランニング"},
  {id:"stretch",emoji:"🧘",label:"ストレッチ"},
  {id:"swim",emoji:"🏊",label:"水泳"},
  {id:"cycle",emoji:"🚴",label:"サイクル"},
  {id:"other",emoji:"⚡",label:"その他"}
];
var EX_DURS=[10,20,30,45,60,90];
var DOW=["月","火","水","木","金","土","日"];

function toKey(d){return d.toISOString().slice(0,10);}
function todayKey(){return toKey(new Date());}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function getISOWeek(d){
  var t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  var w=new Date(t.getFullYear(),0,4);
  return Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7)+1;
}
function getWeekDays(){
  var now=new Date(),dow=(now.getDay()+6)%7;
  return Array.from({length:7},function(_,i){var d=new Date(now);d.setDate(d.getDate()-dow+i);return toKey(d);});
}
function blankStore(){return{tasks:{},weights:{},meals:{},exercises:[]};}
function g(id){return document.getElementById(id);}
function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==="style"&&typeof attrs[k]==="object"){Object.assign(el.style,attrs[k]);}
    else if(k.startsWith("on")){el.addEventListener(k.slice(2),attrs[k]);}
    else{el.setAttribute(k,attrs[k]);}
  });
  if(children){
    if(typeof children==="string"){el.textContent=children;}
    else if(Array.isArray(children)){children.forEach(function(c){if(c)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});}
    else if(children instanceof Node){el.appendChild(children);}
  }
  return el;
}
function t(text){return document.createTextNode(text);}

var store=blankStore();
var currentTab="today";
var wDateOffset=0;
var selExType=null;
var selExDur=null;
var syncTimer=null;
var prevLv=null;

function setSyncStatus(s){
  var el=g("sync-status");if(!el)return;
  var map={idle:"",syncing:"同期中...",saved:"✓ 保存済み",error:"⚠ エラー"};
  var col={idle:"",syncing:"#3a8a5a",saved:"#5aaa78",error:"#c05030"};
  el.textContent=map[s]||"";el.style.color=col[s]||"";
}
function scheduleSync(){
  if(syncTimer)clearTimeout(syncTimer);
  setSyncStatus("syncing");
  syncTimer=setTimeout(function(){
    ghSave(store).then(function(){setSyncStatus("saved");setTimeout(function(){setSyncStatus("idle");},2000);})
    .catch(function(){setSyncStatus("error");});
  },1200);
}
function updateStore(ns){store=ns;scheduleSync();render();}

function showToast(msg){
  var el=document.createElement("div");
  el.className="toast";el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

function getStreak(){
  var c=0,now=new Date();
  for(var i=0;;i++){
    var d=new Date(now);d.setDate(d.getDate()-i);
    var p=TASKS.filter(function(t){return((store.tasks||{})[toKey(d)]||{})[t.id];}).reduce(function(s,t){return s+t.points;},0);
    if(p>0)c++;else break;
  }
  return c;
}
function getTotalXP(){
  return Object.entries(store.tasks||{}).reduce(function(sum,pair){
    var date=pair[0],day=pair[1];
    var mp=(MEAL_RATINGS.find(function(r){return r.id===((store.meals||{})[date]||0);})||{pts:0}).pts;
    return sum+TASKS.filter(function(t){return day[t.id];}).reduce(function(s,t){return s+t.points;},0)+mp;
  },0);
}
function getWeightHistory(){
  return Object.entries(store.weights||{}).filter(function(p){return p[1]!=null;})
    .sort(function(a,b){return a[0].localeCompare(b[0]);}).slice(-30)
    .map(function(p){return{label:p[0].slice(5),v:p[1]};});
}

function lineChartSVG(data,color,height){
  if(!data||data.length<2){
    var div=document.createElement("div");
    div.style.cssText="height:"+height+"px;display:flex;align-items:center;justify-content:center;color:#6a8a6a;font-size:11px";
    div.textContent="2件以上で表示されます";return div;
  }
  var vals=data.map(function(d){return d.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  var pad=26,W=320,H=height;
  function px(i){return pad+(i/(data.length-1))*(W-pad*2);}
  function py(v){return mx===mn?H/2:H-pad-(((v-mn)/(mx-mn))*(H-pad*2));}
  var pts=data.map(function(d,i){return px(i)+","+py(d.v);}).join(" ");
  var areaD="M"+px(0)+","+py(data[0].v)+" "+data.map(function(d,i){return"L"+px(i)+","+py(d.v);}).join(" ")+" L"+px(data.length-1)+","+H+" L"+px(0)+","+H+" Z";
  var step=Math.ceil(data.length/6);
  var ns="http://www.w3.org/2000/svg";
  var svg=document.createElementNS(ns,"svg");
  svg.setAttribute("viewBox","0 0 "+W+" "+H);
  svg.style.cssText="width:100%;height:"+H+"px;display:block";
  var defs=document.createElementNS(ns,"defs");
  var grad=document.createElementNS(ns,"linearGradient");
  grad.setAttribute("id","wg");grad.setAttribute("x1","0");grad.setAttribute("y1","0");grad.setAttribute("x2","0");grad.setAttribute("y2","1");
  var s1=document.createElementNS(ns,"stop");s1.setAttribute("offset","0%");s1.setAttribute("stop-color",color);s1.setAttribute("stop-opacity","0.2");
  var s2=document.createElementNS(ns,"stop");s2.setAttribute("offset","100%");s2.setAttribute("stop-color",color);s2.setAttribute("stop-opacity","0");
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svg.appendChild(defs);
  var area=document.createElementNS(ns,"path");area.setAttribute("d",areaD);area.setAttribute("fill","url(#wg)");svg.appendChild(area);
  var line=document.createElementNS(ns,"polyline");line.setAttribute("points",pts);line.setAttribute("fill","none");line.setAttribute("stroke",color);line.setAttribute("stroke-width","2.2");line.setAttribute("stroke-linejoin","round");line.setAttribute("stroke-linecap","round");svg.appendChild(line);
  data.forEach(function(d,i){
    var c=document.createElementNS(ns,"circle");c.setAttribute("cx",px(i));c.setAttribute("cy",py(d.v));c.setAttribute("r","3.5");c.setAttribute("fill",color);svg.appendChild(c);
    if(i===0||i===data.length-1||i%step===0){
      var tv=document.createElementNS(ns,"text");tv.setAttribute("x",px(i));tv.setAttribute("y",py(d.v)-8);tv.setAttribute("text-anchor","middle");tv.setAttribute("font-size","8");tv.setAttribute("fill","#6a8a6a");tv.textContent=d.v;svg.appendChild(tv);
      var tl=document.createElementNS(ns,"text");tl.setAttribute("x",px(i));tl.setAttribute("y",H-1);tl.setAttribute("text-anchor","middle");tl.setAttribute("font-size","7");tl.setAttribute("fill","#6a8a6a");tl.textContent=d.label;svg.appendChild(tl);
    }
  });
  return svg;
}

function render(){
  var key=todayKey();
  var tasks=store.tasks||{},weights=store.weights||{},meals=store.meals||{},exLogs=store.exercises||[];
  var checked=tasks[key]||{};
  var streak=getStreak(),mult=streakMult(streak);
  var todayBase=TASKS.filter(function(t){return checked[t.id];}).reduce(function(s,t){return s+t.points;},0);
  var mealRating=MEAL_RATINGS.find(function(r){return r.id===meals[key];})||null;
  var mealPts=mealRating?mealRating.pts:0;
  var todayPts=Math.round((todayBase+mealPts)*mult);
  var todayPct=Math.round((todayBase/BASE_TOTAL)*100);
  var doneNum=TASKS.filter(function(t){return checked[t.id];}).length;
  var totalXP=getTotalXP();
  var lvInfo=getLevel(totalXP);
  var curLv=lvInfo.cur,nextLv=lvInfo.next;
  var xpInLevel=totalXP-curLv.xp;
  var xpNeeded=nextLv?nextLv.xp-curLv.xp:1;
  var lvPct=nextLv?Math.min(100,Math.round((xpInLevel/xpNeeded)*100)):100;
  if(prevLv!==null&&curLv.lv>prevLv)showToast("🎉 LEVEL UP! Lv"+curLv.lv+"「"+curLv.title+"」");
  prevLv=curLv.lv;
  var weekDays=getWeekDays();
  var weekNum=getISOWeek(new Date());
  var missions=getWeekMissions(weekNum);
  var weekDayData=weekDays.map(function(k){return tasks[k]||{};});
  var weekPcts=weekDays.map(function(k){
    var d=tasks[k]||{};
    return Math.round((TASKS.filter(function(t){return d[t.id];}).reduce(function(s,t){return s+t.points;},0)/BASE_TOTAL)*100);
  });
  var weekAvg=Math.round(weekPcts.reduce(function(s,v){return s+v;},0)/7);
  var rank=getRank(weekAvg),nextRank=getNextRank(rank);
  var missionsDone=missions.map(function(m){
    return m.chk(weekDayData.map(function(d){
      var obj={};TASKS.forEach(function(t){obj[t.id]=!!d[t.id];});return obj;
    }));
  });
  var weightHistory=getWeightHistory();
  var latestW=weightHistory.length?weightHistory[weightHistory.length-1].v:null;
  var firstW=weightHistory.length?weightHistory[0].v:null;
  var wDiff=latestW&&firstW?(latestW-firstW).toFixed(1):null;
  var exByDay={};
  exLogs.forEach(function(e){exByDay[e.date]=(exByDay[e.date]||0)+Number(e.duration||0);});
  var ex14=Array.from({length:14},function(_,i){
    var d=new Date();d.setDate(d.getDate()-(13-i));
    var k=toKey(d);
    return{label:DOW[(d.getDay()+6)%7],v:exByDay[k]||0,key:k};
  });
  var todayExLogs=exLogs.filter(function(e){return e.date===key;});
  var wTargetDate=toKey(addDays(new Date(),wDateOffset));
  var wVal=weights[wTargetDate]||"";

  // Build DOM
  var wrap=document.createElement("div");
  wrap.className="wrap";

  // Header
  var hdr=document.createElement("div");
  hdr.style.cssText="margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-start";
  var hdrLeft=document.createElement("div");
  var hdrLabel=document.createElement("div");
  hdrLabel.style.cssText="font-size:10px;letter-spacing:3px;color:#6a8a6a;font-weight:600;margin-bottom:2px";
  hdrLabel.textContent="WEDDING DIET TRACKER";
  var hdrTitle=document.createElement("div");
  hdrTitle.style.cssText="font-size:20px;font-weight:800";
  hdrTitle.textContent="理想の新郎へ 🤵";
  var hdrDate=document.createElement("div");
  hdrDate.style.cssText="font-size:11px;color:#6a8a6a;margin-top:2px";
  hdrDate.textContent=new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"});
  hdrLeft.appendChild(hdrLabel);hdrLeft.appendChild(hdrTitle);hdrLeft.appendChild(hdrDate);
  var syncEl=document.createElement("div");
  syncEl.id="sync-status";syncEl.style.cssText="font-size:10px;font-weight:600;margin-top:4px";
  hdr.appendChild(hdrLeft);hdr.appendChild(syncEl);
  wrap.appendChild(hdr);

  // Level bar
  var lvCard=document.createElement("div");lvCard.className="card";lvCard.style.cssText="margin-bottom:12px;padding:11px 14px";
  var lvRow=document.createElement("div");lvRow.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px";
  var lvLeft=document.createElement("div");lvLeft.style.cssText="display:flex;align-items:center;gap:8px";
  var lvBadge=document.createElement("div");lvBadge.style.cssText="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#5aaa78,#3a8a5a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff";
  lvBadge.textContent=curLv.lv;
  var lvName=document.createElement("div");lvName.style.cssText="font-size:13px;font-weight:800";lvName.textContent=curLv.title;
  lvLeft.appendChild(lvBadge);lvLeft.appendChild(lvName);
  var lvXP=document.createElement("div");lvXP.style.cssText="font-size:11px;color:#3a8a5a;font-weight:700";lvXP.textContent=totalXP.toLocaleString()+" XP";
  lvRow.appendChild(lvLeft);lvRow.appendChild(lvXP);
  var lvBarBg=document.createElement("div");lvBarBg.style.cssText="background:#edf7ed;border-radius:6px;height:6px;overflow:hidden";
  var lvBarFill=document.createElement("div");lvBarFill.style.cssText="height:100%;width:"+lvPct+"%;background:linear-gradient(90deg,#5aaa78,#3a8a5a);border-radius:6px";
  lvBarBg.appendChild(lvBarFill);
  lvCard.appendChild(lvRow);lvCard.appendChild(lvBarBg);
  if(nextLv){var lvNext=document.createElement("div");lvNext.style.cssText="font-size:9px;color:#6a8a6a;margin-top:3px;text-align:right";lvNext.textContent="Lv"+nextLv.lv+"まで "+(nextLv.xp-totalXP)+" XP";lvCard.appendChild(lvNext);}
  wrap.appendChild(lvCard);

  // Stats row
  var statsRow=document.createElement("div");statsRow.style.cssText="display:flex;gap:7px;margin-bottom:12px";
  [[" 🔥",streak+"日","継続中",null,mult>1?"x"+mult+"倍中":null],[rank.emoji,rank.name,"今週ランク",rank.color,null],["⚡",todayPts+"pt","今日のXP",null,null]].forEach(function(s){
    var box=document.createElement("div");box.className="card";box.style.cssText="flex:1;padding:9px 10px";
    var ic=document.createElement("div");ic.style.fontSize="17px";ic.textContent=s[0];
    var val=document.createElement("div");val.style.cssText="font-size:13px;font-weight:800;color:"+(s[3]||"#3a8a5a")+";margin-top:2px";val.textContent=s[1];

    var rkRow=document.createElement("div");rkRow.style.cssText="display:flex;justify-content:space-between;align-items:center";
    var rkLeft=document.createElement("div");
    var rkLbl=document.createElement("div");rkLbl.className="lbl";rkLbl.textContent="今週のランク";
    var rkName=document.createElement("div");rkName.style.cssText="font-size:22px;font-weight:800;color:"+rank.color;rkName.textContent=rank.emoji+" "+rank.name;
    var rkAvg=document.createElement("div");rkAvg.style.cssText="font-size:11px;color:#6a8a6a;margin-top:2px";rkAvg.textContent="週平均達成率: "+weekAvg+"%";
    rkLeft.appendChild(rkLbl);rkLeft.appendChild(rkName);rkLeft.appendChild(rkAvg);
    var rkRight=document.createElement("div");rkRight.style.textAlign="right";
    if(nextRank){var nrLbl=document.createElement("div");nrLbl.style.cssText="font-size:9px;color:#6a8a6a";nrLbl.textContent="次のランクまで";var nrVal=document.createElement("div");nrVal.style.cssText="font-size:20px;font-weight:800;color:"+nextRank.color;nrVal.textContent=(nextRank.min-weekAvg)+"%";var nrName=document.createElement("div");nrName.style.cssText="font-size:9px;color:#6a8a6a";nrName.textContent=nextRank.emoji+" "+nextRank.name;rkRight.appendChild(nrLbl);rkRight.appendChild(nrVal);rkRight.appendChild(nrName);}
    else{var topMsg=document.createElement("div");topMsg.style.cssText="font-size:12px;font-weight:800;color:#3a8a5a";topMsg.textContent="最高ランク！💍";rkRight.appendChild(topMsg);}
    rkRow.appendChild(rkLeft);rkRow.appendChild(rkRight);rkCard.appendChild(rkRow);
    content.appendChild(rkCard);

    // Week chart
    var wkCard=document.createElement("div");wkCard.className="card";wkCard.style.marginBottom="14px";
    var wkLbl=document.createElement("div");wkLbl.className="lbl";wkLbl.textContent="今週の達成率";
    var wkBars=document.createElement("div");wkBars.style.cssText="display:flex;align-items:flex-end;gap:6px;height:62px";
    weekDays.forEach(function(k,i){
      var isToday=k===key,isPast=k<key;
      var col=document.createElement("div");col.style.cssText="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px";
      var pLbl=document.createElement("div");pLbl.style.cssText="font-size:8px;color:"+(weekPcts[i]>0?"#3a8a5a":"#6a8a6a")+";font-weight:600";pLbl.textContent=weekPcts[i]>0?weekPcts[i]+"%":"";
      var bar=document.createElement("div");bar.style.cssText="width:100%;height:"+Math.max(3,weekPcts[i]*0.52)+"px;background:"+(isToday?"#3a8a5a":weekPcts[i]>0?"#c8e6c9":"#d4e8d4")+";border-radius:4px;opacity:"+(!isPast&&!isToday?0.3:1);
      var dLbl=document.createElement("div");dLbl.style.cssText="font-size:9px;color:"+(isToday?"#3a8a5a":"#6a8a6a")+";font-weight:"+(isToday?700:400);dLbl.textContent=DOW[i];
      col.appendChild(pLbl);col.appendChild(bar);col.appendChild(dLbl);wkBars.appendChild(col);
    });
    wkCard.appendChild(wkLbl);wkCard.appendChild(wkBars);content.appendChild(wkCard);

    // Missions
    var msLbl=document.createElement("div");msLbl.style.cssText="font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:10px";msLbl.textContent="今週のミッション";content.appendChild(msLbl);
    missions.forEach(function(m,i){
      var done=missionsDone[i];
      var mc=document.createElement("div");mc.className="card";mc.style.cssText="padding:12px 14px;margin-bottom:8px;border-color:"+(done?"#3a8a5a":"#d4e8d4")+";background:"+(done?"rgba(58,138,90,0.05)":"#fff");
      var mr=document.createElement("div");mr.style.cssText="display:flex;align-items:center;gap:10px";
      var mIco=document.createElement("span");mIco.style.fontSize="20px";mIco.textContent=done?"🏆":"🎯";
      var mInfo=document.createElement("div");mInfo.style.flex="1";
      var mTitle=document.createElement("div");mTitle.style.cssText="font-size:12px;font-weight:"+(done?800:500)+";color:"+(done?"#1a2e1a":"#6a8a6a");mTitle.textContent=m.label;
      var mStatus=document.createElement("div");mStatus.style.cssText="font-size:10px;color:"+(done?"#3a8a5a":"#6a8a6a")+";margin-top:2px;font-weight:600";mStatus.textContent=done?"✅ クリア！+50XP":"未達成";
      mInfo.appendChild(mTitle);mInfo.appendChild(mStatus);mr.appendChild(mIco);mr.appendChild(mInfo);mc.appendChild(mr);content.appendChild(mc);
    });

    // Level roadmap
    var rmCard=document.createElement("div");rmCard.className="card";
    var rmLbl=document.createElement("div");rmLbl.className="lbl";rmLbl.textContent="全レベルロードマップ";rmCard.appendChild(rmLbl);
    LEVELS.forEach(function(lv){
      var unlocked=totalXP>=lv.xp,isCur=lv.lv===curLv.lv;
      var row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:10px;opacity:"+(unlocked?1:0.4)+";padding:6px 10px;border-radius:8px;background:"+(isCur?"#edf7ed":"transparent")+";border:1px solid "+(isCur?"#c8e6c9":"transparent");
      var badge=document.createElement("div");badge.style.cssText="width:24px;height:24px;border-radius:50%;background:"+(unlocked?"#3a8a5a":"#d4e8d4")+";display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0";badge.textContent=lv.lv;
      var info=document.createElement("div");info.style.flex="1";
      var name=document.createElement("div");name.style.cssText="font-size:12px;font-weight:"+(isCur?800:500)+";color:"+(isCur?"#1a2e1a":"#6a8a6a");name.textContent=lv.title;
      var xpLbl=document.createElement("div");xpLbl.style.cssText="font-size:9px;color:#6a8a6a";xpLbl.textContent=lv.xp.toLocaleString()+" XP〜";
      info.appendChild(name);info.appendChild(xpLbl);
      row.appendChild(badge);row.appendChild(info);
      if(isCur){var cur=document.createElement("span");cur.style.cssText="font-size:10px;color:#3a8a5a;font-weight:700";cur.textContent="← 現在";row.appendChild(cur);}
      else if(unlocked){var ck=document.createElement("span");ck.style.fontSize="13px";ck.textContent="✅";row.appendChild(ck);}
      rmCard.appendChild(row);
    });
    content.appendChild(rmCard);
  }

  var footer=document.createElement("div");footer.style.cssText="text-align:center;margin-top:24px;font-size:10px;color:#6a8a6a";footer.textContent="毎日少しずつ、必ず変わる 🌿";
  content.appendChild(footer);
  wrap.appendChild(content);

  var root=g("root");root.innerHTML="";root.appendChild(wrap);
}

function toggleTask(id){
  var key=todayKey(),tasks=store.tasks||{},checked=Object.assign({},tasks[key]||{});
  checked[id]=!checked[id];
  var newTasks=Object.assign({},tasks);newTasks[key]=checked;
  updateStore(Object.assign({},store,{tasks:newTasks}));
}
function rateMeal(id){
  var newMeals=Object.assign({},store.meals||{});newMeals[todayKey()]=id;
  updateStore(Object.assign({},store,{meals:newMeals}));
}
function saveExercise(){
  if(!selExType||!selExDur)return;
  var entry={id:Date.now(),date:todayKey(),type:selExType.label,emoji:selExType.emoji,duration:selExDur};
  var newEx=(store.exercises||[]).concat([entry]);
  updateStore(Object.assign({},store,{exercises:newEx}));
  selExType=null;selExDur=null;
}
function deleteEx(id){
  var newEx=(store.exercises||[]).filter(function(e){return e.id!==id;});
  updateStore(Object.assign({},store,{exercises:newEx}));
}

function renderSetup(errMsg){
  var root=g("root");root.innerHTML="";
  var wrap=document.createElement("div");wrap.className="setup";
  var card=document.createElement("div");card.className="scard";
  var ico=document.createElement("div");ico.style.cssText="font-size:32px;text-align:center;margin-bottom:12px";ico.textContent="🤵";
  var title=document.createElement("div");title.style.cssText="font-size:18px;font-weight:800;text-align:center;margin-bottom:6px";title.textContent="初回セットアップ";
  var desc=document.createElement("div");desc.style.cssText="font-size:12px;color:#6a8a6a;text-align:center;margin-bottom:20px;line-height:1.6";desc.textContent="GitHubのPersonal Access Tokenを入力してください。データの保存に使用します。";
  var inp=document.createElement("input");inp.type="password";inp.placeholder="ghp_xxxxxxxxxxxx";inp.id="token-input";inp.style.cssText="width:100%;padding:12px;border-radius:10px;border:1.5px solid #d4e8d4;font-size:13px;color:#1a2e1a;background:#f2f6f2;margin-bottom:10px;box-sizing:border-box";
  var btn=document.createElement("button");btn.className="pbtn";btn.id="setup-btn";btn.textContent="接続してスタート";btn.style.marginTop="0";
  btn.addEventListener("click",function(){doSetup(inp,btn);});
  card.appendChild(ico);card.appendChild(title);card.appendChild(desc);
  if(errMsg){var err=document.createElement("div");err.style.cssText="font-size:11px;color:#c05030;margin-bottom:10px;line-height:1.5";err.textContent=errMsg;card.appendChild(err);}
  card.appendChild(inp);card.appendChild(btn);
  var note=document.createElement("div");note.style.cssText="font-size:10px;color:#6a8a6a;margin-top:12px;text-align:center;line-height:1.6";note.textContent="トークンはこの端末のみに保存されます";
  card.appendChild(note);wrap.appendChild(card);root.appendChild(wrap);
}

function doSetup(inp,btn){
  var val=inp.value.trim();if(!val)return;
  setToken(val);btn.disabled=true;btn.innerHTML='<span class="sp"></span> 接続中...';
  ghFetch().then(function(data){store=data||blankStore();render();})
  .catch(function(){setToken("");renderSetup("トークンが正しくないか、data.jsonが見つかりません。");});
}

function showLoading(){
  var root=g("root");root.innerHTML="";
  var div=document.createElement("div");div.style.cssText="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px";
  var sp=document.createElement("div");sp.className="sp";
  var msg=document.createElement("div");msg.style.cssText="font-size:13px;color:#6a8a6a";msg.textContent="読み込み中...";
  div.appendChild(sp);div.appendChild(msg);root.appendChild(div);
}

function init(){
  showLoading();
  var token=getToken();
  if(!token){renderSetup();return;}
  ghFetch().then(function(data){store=data||blankStore();render();})
  .catch(function(){setToken("");renderSetup("再接続が必要です。トークンを再入力してください。");});
}

init();
</script>
</body>
</html>
