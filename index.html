<!DOCTYPE html> 
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="新郎Diet"/>
<meta name="theme-color" content="#3a8a5a"/>
<title>新郎ダイエットトラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f2f6f2;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#1a2e1a;-webkit-font-smoothing:antialiased}
button,input{font-family:inherit}
input:focus{outline:none;border-color:#3a8a5a!important}
::-webkit-scrollbar{display:none}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 48px;min-height:100vh}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 10px rgba(40,90,60,0.08);border:1px solid #d4e8d4;margin-bottom:12px}
.lbl{font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:#edf7ed;border-radius:10px;padding:3px}
.tab{flex:1;padding:7px 2px;border-radius:8px;border:none;background:transparent;color:#6a8a6a;font-weight:500;font-size:10px;cursor:pointer}
.tab.on{background:#fff;color:#3a8a5a;font-weight:800;box-shadow:0 1px 4px rgba(40,90,60,0.1)}
.pbtn{border:none;background:#3a8a5a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;border-radius:9px;padding:10px 16px;width:100%;margin-top:8px}
.pbtn:disabled{background:#c8e6c9;cursor:default}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:20px;height:20px;border:3px solid #c8e6c9;border-top:3px solid #3a8a5a;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes fadeUp{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.toast{position:fixed;top:24px;left:50%;background:#3a8a5a;color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;font-weight:800;z-index:9999;box-shadow:0 6px 24px rgba(40,130,80,0.45);animation:fadeUp 3s ease forwards;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>
<div id="root"></div>
<script>
var STORE_KEY = 'groomDiet5';
var TASKS = [
  {id:'breakfast',emoji:'🍳',label:'朝ごはんを食べた',points:20,note:'代謝UP・食べすぎ防止'},
  {id:'water',emoji:'💧',label:'水を1.5L飲む',points:10},
  {id:'vegFirst',emoji:'🥗',label:'野菜から先に食べた',points:10},
  {id:'noLateEat',emoji:'🌙',label:'21時以降食べなかった',points:15},
  {id:'snack',emoji:'🍪',label:'間食を我慢 or 半分に',points:15},
  {id:'walk',emoji:'🚶',label:'15〜30分歩いた',points:20},
  {id:'exercise',emoji:'💪',label:'筋トレをした',points:25},
  {id:'weigh',emoji:'⚖️',label:'体重を記録した',points:5}
];
var BASE = TASKS.reduce(function(s,t){return s+t.points;},0);
var LEVELS = [
  {lv:1,xp:0,title:'見習い新郎'},{lv:2,xp:200,title:'意識高め新郎'},
  {lv:3,xp:500,title:'ダイエット戦士'},{lv:4,xp:900,title:'習慣マスター'},
  {lv:5,xp:1400,title:'鋼の意志'},{lv:6,xp:2000,title:'体型番長'},
  {lv:7,xp:2700,title:'スーツの申し子'},{lv:8,xp:3500,title:'伝説の花婿候補'},
  {lv:9,xp:4400,title:'ウェディング覇者'},{lv:10,xp:5500,title:'完璧な新郎'}
];
var RANKS = [
  {name:'Bronze',min:0,color:'#a06840',emoji:'🥉'},
  {name:'Silver',min:40,color:'#8a9aaa',emoji:'🥈'},
  {name:'Gold',min:65,color:'#c9a84c',emoji:'🥇'},
  {name:'Wedding',min:85,color:'#3a8a5a',emoji:'💍'}
];
var MEALS = [
  {id:5,emoji:'😇',label:'完璧',note:'朝昼夜◎・間食なし',color:'#3a8a5a',pts:20},
  {id:4,emoji:'🙂',label:'良い',note:'3食・少し間食あり',color:'#5aaa78',pts:15},
  {id:3,emoji:'😐',label:'普通',note:'1食抜き or 間食多め',color:'#c9a84c',pts:8},
  {id:2,emoji:'😓',label:'よくない',note:'2食抜き or 夜遅食',color:'#d08040',pts:3},
  {id:1,emoji:'🍕',label:'ダメ',note:'食べすぎ・反省あり',color:'#c05030',pts:0}
];
var EX_TYPES = [
  {id:'s',emoji:'💪',label:'筋トレ'},
  {id:'w',emoji:'🚶',label:'ウォーク'},
  {id:'r',emoji:'🏃',label:'ランニング'},
  {id:'st',emoji:'🧘',label:'ストレッチ'},
  {id:'sw',emoji:'🏊',label:'水泳'},
  {id:'c',emoji:'🚴',label:'サイクル'},
  {id:'o',emoji:'⚡',label:'その他'}
];
var EX_DURS = [10,20,30,45,60,90];
var DOW = ['月','火','水','木','金','土','日'];

function toKey(d){return d.toISOString().slice(0,10);}
function today(){return toKey(new Date());}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function isoWeek(d){
  var t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  var w=new Date(t.getFullYear(),0,4);
  return Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7)+1;
}
function weekDays(){
  var now=new Date(),dow=(now.getDay()+6)%7;
  return Array.from({length:7},function(_,i){var d=new Date(now);d.setDate(d.getDate()-dow+i);return toKey(d);});
}
function loadStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}');}catch(e){return {};}}
function saveStore(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}
function blank(){return {tasks:{},weights:{},meals:{},exercises:[]};}
function getLevel(xp){
  var c=LEVELS[0],n=LEVELS[1];
  for(var i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){c=LEVELS[i];n=LEVELS[i+1]||null;break;}}
  return {cur:c,next:n};
}
function getRank(p){var r=RANKS[0];for(var i=RANKS.length-1;i>=0;i--){if(p>=RANKS[i].min){r=RANKS[i];break;}}return r;}
function mlt(s){return s>=30?2:s>=7?1.5:s>=3?1.2:1;}
function ge(id){return document.getElementById(id);}
function ce(tag){return document.createElement(tag);}
function ct(s){return document.createTextNode(s);}
function sv(tag,attrs){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  if(attrs)Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});
  return el;
}

var store=blank();
var tab='today';
var wOff=0;
var exType=null;
var exDur=null;
var prevLv=null;

function toast(msg){
  var el=ce('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},3000);
}

function streak(){
  var c=0,now=new Date();
  for(var i=0;;i++){
    var d=new Date(now);d.setDate(d.getDate()-i);
    var p=TASKS.filter(function(t){return((store.tasks||{})[toKey(d)]||{})[t.id];}).reduce(function(s,t){return s+t.points;},0);
    if(p>0)c++;else break;
  }
  return c;
}
function totalXP(){
  return Object.keys(store.tasks||{}).reduce(function(sum,date){
    var day=store.tasks[date];
    var mp=0;var mr=MEALS.find(function(r){return r.id===((store.meals||{})[date]||0);});if(mr)mp=mr.pts;
    return sum+TASKS.filter(function(t){return day[t.id];}).reduce(function(s,t){return s+t.points;},0)+mp;
  },0);
}
function wHistory(){
  return Object.keys(store.weights||{}).filter(function(k){return store.weights[k]!=null;})
    .sort().slice(-30).map(function(k){return{label:k.slice(5),v:store.weights[k]};});
}

function update(ns){store=ns;saveStore(ns);render();}

function cs(tag,css,text){var el=ce(tag);el.style.cssText=css;if(text!==undefined)el.textContent=text;return el;}
function ap(parent){
  var args=Array.prototype.slice.call(arguments,1);
  args.forEach(function(c){if(c)parent.appendChild(c);});
  return parent;
}

function makeSVGChart(data,color,height){
  if(!data||data.length<2){
    return cs('div','height:'+height+'px;display:flex;align-items:center;justify-content:center;color:#6a8a6a;font-size:11px','2件以上で表示されます');
  }
  var vals=data.map(function(d){return d.v;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  var pad=26,W=320,H=height;
  function px(i){return pad+(i/(data.length-1))*(W-pad*2);}
  function py(v){return mx===mn?H/2:H-pad-(((v-mn)/(mx-mn))*(H-pad*2));}
  var pts=data.map(function(d,i){return px(i)+','+py(d.v);}).join(' ');
  var aD='M'+px(0)+','+py(data[0].v)+' '+data.map(function(d,i){return'L'+px(i)+','+py(d.v);}).join(' ')+' L'+px(data.length-1)+','+H+' L'+px(0)+','+H+' Z';
  var step=Math.ceil(data.length/6);
  var s=sv('svg',{viewBox:'0 0 '+W+' '+H,style:'width:100%;height:'+H+'px;display:block'});
  var defs=sv('defs');
  var g=sv('linearGradient',{id:'cg',x1:'0',y1:'0',x2:'0',y2:'1'});
  var s1=sv('stop',{offset:'0%','stop-color':color,'stop-opacity':'0.2'});
  var s2=sv('stop',{offset:'100%','stop-color':color,'stop-opacity':'0'});
  ap(g,s1,s2);ap(defs,g);ap(s,defs);
  ap(s,sv('path',{d:aD,fill:'url(#cg)'}));
  ap(s,sv('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':'2.2','stroke-linejoin':'round','stroke-linecap':'round'}));
  data.forEach(function(d,i){
    ap(s,sv('circle',{cx:px(i),cy:py(d.v),r:'3.5',fill:color}));
    if(i===0||i===data.length-1||i%step===0){
      var tv=sv('text',{x:px(i),y:py(d.v)-8,'text-anchor':'middle','font-size':'8',fill:'#6a8a6a'});tv.textContent=d.v;ap(s,tv);
      var tl=sv('text',{x:px(i),y:H-1,'text-anchor':'middle','font-size':'7',fill:'#6a8a6a'});tl.textContent=d.label;ap(s,tl);
    }
  });
  return s;
}

function render(){
  var key=today();
  var tasks=store.tasks||{},weights=store.weights||{},meals=store.meals||{},exLogs=store.exercises||[];
  var chk=tasks[key]||{};
  var str=streak(),m=mlt(str);
  var base=TASKS.filter(function(t){return chk[t.id];}).reduce(function(s,t){return s+t.points;},0);
  var mr=MEALS.find(function(r){return r.id===meals[key];})||null;
  var pts=Math.round((base+(mr?mr.pts:0))*m);
  var pct=Math.round((base/BASE)*100);
  var done=TASKS.filter(function(t){return chk[t.id];}).length;
  var xp=totalXP();
  var lv=getLevel(xp);var cl=lv.cur,nl=lv.next;
  var xpIn=xp-cl.xp,xpNd=nl?nl.xp-cl.xp:1;
  var lvp=nl?Math.min(100,Math.round((xpIn/xpNd)*100)):100;
  if(prevLv!==null&&cl.lv>prevLv)toast('🎉 LEVEL UP! Lv'+cl.lv+'「'+cl.title+'」');
  prevLv=cl.lv;
  var wd=weekDays(),wn=isoWeek(new Date());
  var wps=wd.map(function(k){var d=tasks[k]||{};return Math.round((TASKS.filter(function(t){return d[t.id];}).reduce(function(s,t){return s+t.points;},0)/BASE)*100);});
  var wavg=Math.round(wps.reduce(function(s,v){return s+v;},0)/7);
  var rk=getRank(wavg),nrk=null;
  for(var ri=0;ri<RANKS.length;ri++){if(RANKS[ri].name===rk.name&&ri+1<RANKS.length){nrk=RANKS[ri+1];break;}}
  var ms=[],msDone=[];
  var allMs=[
    {label:'今週、朝ごはんを5日以上食べる',chk:function(d){return d.filter(function(x){return x.breakfast;}).length>=5;}},
    {label:'今週、筋トレを4回以上する',chk:function(d){return d.filter(function(x){return x.exercise;}).length>=4;}},
    {label:'今週、毎日水1.5Lを達成する',chk:function(d){return d.every(function(x){return x.water;});}},
    {label:'今週、間食ゼロの日を3日作る',chk:function(d){return d.filter(function(x){return x.snack;}).length>=3;}},
    {label:'今週、21時以降食べない日を5日作る',chk:function(d){return d.filter(function(x){return x.noLateEat;}).length>=5;}},
    {label:'今週、毎日体重を記録する',chk:function(d){return d.every(function(x){return x.weigh;});}},
    {label:'今週、ウォーキングを5回以上する',chk:function(d){return d.filter(function(x){return x.walk;}).length>=5;}}
  ];
  ms=[allMs[wn%allMs.length],allMs[(wn+1)%allMs.length]];
  var wdd=wd.map(function(k){return tasks[k]||{};});
  msDone=ms.map(function(ms){return ms.chk(wdd.map(function(d){var o={};TASKS.forEach(function(t){o[t.id]=!!d[t.id];});return o;}));});
  var wh=wHistory();
  var lw=wh.length?wh[wh.length-1].v:null,fw=wh.length?wh[0].v:null;
  var wd2=lw&&fw?(lw-fw).toFixed(1):null;
  var exByDay={};exLogs.forEach(function(e){exByDay[e.date]=(exByDay[e.date]||0)+Number(e.duration||0);});
  var ex14=Array.from({length:14},function(_,i){var d=new Date();d.setDate(d.getDate()-(13-i));var k=toKey(d);return{label:DOW[(d.getDay()+6)%7],v:exByDay[k]||0,key:k};});
  var texLogs=exLogs.filter(function(e){return e.date===key;});
  var wTgt=toKey(addDays(new Date(),wOff));
  var wVal=weights[wTgt]||'';

  var wrap=cs('div','');wrap.className='wrap';

  // Header
  var hdr=cs('div','margin-bottom:16px');
  ap(hdr,
    cs('div','font-size:10px;letter-spacing:3px;color:#6a8a6a;font-weight:600;margin-bottom:2px','WEDDING DIET TRACKER'),
    cs('div','font-size:20px;font-weight:800','理想の新郎へ 🤵'),
    cs('div','font-size:11px;color:#6a8a6a;margin-top:2px',new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'}))
  );
  ap(wrap,hdr);

  // Level bar
  var lc=ce('div');lc.className='card';lc.style.cssText='margin-bottom:12px;padding:11px 14px';
  var lr=cs('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:7px');
  var ll=cs('div','display:flex;align-items:center;gap:8px');
  var lb=cs('div','width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#5aaa78,#3a8a5a);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff',String(cl.lv));
  var ln=cs('div','font-size:13px;font-weight:800',cl.title);
  ap(ll,lb,ln);
  ap(lr,ll,cs('div','font-size:11px;color:#3a8a5a;font-weight:700',xp.toLocaleString()+' XP'));
  var lbg=cs('div','background:#edf7ed;border-radius:6px;height:6px;overflow:hidden');
  ap(lbg,cs('div','height:100%;width:'+lvp+'%;background:linear-gradient(90deg,#5aaa78,#3a8a5a);border-radius:6px'));
  ap(lc,lr,lbg);
  if(nl)ap(lc,cs('div','font-size:9px;color:#6a8a6a;margin-top:3px;text-align:right','Lv'+nl.lv+'まで '+(nl.xp-xp)+' XP'));
  ap(wrap,lc);

  // Stats
  var sr=cs('div','display:flex;gap:7px;margin-bottom:12px');
  [[' 🔥',str+'日','継続中',null,m>1?'x'+m+'倍中':null],[rk.emoji,rk.name,'今週ランク',rk.color,null],['⚡',pts+'pt','今日XP',null,null]].forEach(function(s){
    var b=ce('div');b.className='card';b.style.cssText='flex:1;padding:9px 10px';
    ap(b,cs('div','font-size:17px',s[0]),cs('div','font-size:13px;font-weight:800;color:'+(s[3]||'#3a8a5a')+';margin-top:2px',s[1]),cs('div','font-size:9px;color:#6a8a6a;margin-top:1px',s[2]));
    if(s[4])ap(b,cs('div','font-size:8px;color:#5aaa78;font-weight:600;margin-top:1px',s[4]));
    ap(sr,b);
  });
  ap(wrap,sr);

  // Tabs
  var tabsEl=cs('div','');tabsEl.className='tabs';
  [['today','今日'],['meal','食事'],['record','体重・運動'],['progress','進捗']].forEach(function(tb){
    var b=ce('button');b.className='tab'+(tab===tb[0]?' on':'');b.textContent=tb[1];
    b.addEventListener('click',function(){tab=tb[0];render();});
    ap(tabsEl,b);
  });
  ap(wrap,tabsEl);

  var con=ce('div');

  if(tab==='today'){
    // Ring
    var rc=ce('div');rc.className='card';rc.style.cssText='display:flex;align-items:center;gap:16px;margin-bottom:12px';
    var rw=cs('div','position:relative;width:70px;height:70px;flex-shrink:0');
    var circ=2*Math.PI*28;
    var svg=sv('svg',{width:'70',height:'70',viewBox:'0 0 70 70'});
    ap(svg,sv('circle',{cx:'35',cy:'35',r:'28',fill:'none',stroke:'#c8e6c9','stroke-width':'6'}));
    ap(svg,sv('circle',{cx:'35',cy:'35',r:'28',fill:'none',stroke:'#3a8a5a','stroke-width':'6','stroke-dasharray':circ.toFixed(1),'stroke-dashoffset':(circ*(1-pct/100)).toFixed(1),'stroke-linecap':'round',transform:'rotate(-90 35 35)'}));
    ap(rw,svg,cs('div','position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:800;color:#3a8a5a',pct+'%'));
    var ri=cs('div','flex:1');
    ap(ri,cs('div','font-size:13px;font-weight:800;margin-bottom:3px',pct===100?'完璧！満点🎉':pct>=80?'あと少し！':pct>=50?'いい調子！':'今日も頑張ろう！'));
    ap(ri,cs('div','font-size:11px;color:#6a8a6a',done+'/'+TASKS.length+' タスク完了'));
    if(mr)ap(ri,cs('div','margin-top:4px;font-size:11px;color:'+mr.color+';font-weight:600',mr.emoji+' 食事: '+mr.label));
    if(m>1)ap(ri,cs('div','margin-top:5px;font-size:10px;background:#edf7ed;display:inline-block;padding:2px 8px;border-radius:10px;color:#3a8a5a;font-weight:700','🔥 x'+m+'倍ボーナス中'));
    ap(rc,rw,ri);ap(con,rc);

    TASKS.forEach(function(task){
      var dn=!!chk[task.id],isB=task.id==='breakfast';
      var btn=ce('button');
      btn.style.cssText='display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:1.5px solid '+(dn?'#3a8a5a':isB&&!dn?'#e0a040':'#d4e8d4')+';background:'+(dn?'rgba(58,138,90,0.05)':isB&&!dn?'#fffbf0':'#fff')+';cursor:pointer;text-align:left;width:100%;margin-bottom:7px';
      btn.addEventListener('click',(function(id){return function(){var t2=store.tasks||{},c2=Object.assign({},t2[key]||{});c2[id]=!c2[id];var nt=Object.assign({},t2);nt[key]=c2;update(Object.assign({},store,{tasks:nt}));};}))(task.id);
      var info=cs('div','flex:1');
      ap(info,cs('div','font-size:13px;font-weight:'+(dn?700:500)+';color:'+(dn?'#1a2e1a':'#6a8a6a'),task.label));
      if(isB&&!dn&&task.note)ap(info,cs('div','font-size:9px;color:#c08020;margin-top:2px',task.note));
      var ptd=cs('div','text-align:right;flex-shrink:0');
      ap(ptd,cs('div','font-size:11px;font-weight:700;color:'+(dn?'#3a8a5a':isB?'#c08020':'#d4e8d4'),'+'+Math.round(task.points*m)+'pt'));
      if(m>1)ap(ptd,cs('div','font-size:8px;color:#5aaa78','base '+task.points));
      var chkEl=cs('div','width:20px;height:20px;border-radius:50%;background:'+(dn?'#3a8a5a':'#d4e8d4')+';display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0',dn?'✓':'');
      ap(btn,cs('span','font-size:20px',task.emoji),info,ptd,chkEl);ap(con,btn);
    });

    var ms2=ce('div');ms2.className='card';ms2.style.cssText='display:flex;align-items:center;gap:12px;cursor:pointer';
    ms2.addEventListener('click',function(){tab='meal';render();});
    ap(ms2,cs('span','font-size:22px',mr?mr.emoji:'🍽️'));
    var mi=cs('div','flex:1');
    ap(mi,cs('div','font-size:12px;font-weight:700',mr?'食事記録: '+mr.label:'食事の記録をつける'),cs('div','font-size:10px;color:#6a8a6a;margin-top:1px',mr?'+'+mr.pts+'pt獲得':'「食事」タブで記録 →'));
    ap(ms2,mi);ap(con,ms2);
  }

  else if(tab==='meal'){
    var mc=ce('div');mc.className='card';mc.style.marginBottom='14px';
    ap(mc,cs('div','font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:4px','🍽️ 今日の食事'));
    ap(mc,cs('div','font-size:11px;color:#6a8a6a;margin-bottom:14px','今日の食事全体を振り返って選んでください'));
    MEALS.forEach(function(r){
      var sel=meals[key]===r.id;
      var btn=ce('button');
      btn.style.cssText='display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:2px solid '+(sel?r.color:'#d4e8d4')+';background:'+(sel?r.color+'26':'#fff')+';cursor:pointer;text-align:left;width:100%;margin-bottom:7px';
      btn.addEventListener('click',(function(rid){return function(){var nm=Object.assign({},store.meals||{});nm[key]=rid;update(Object.assign({},store,{meals:nm}));};}))(r.id);
      var inf=cs('div','flex:1');
      var nm2=cs('span','font-size:14px;font-weight:700;color:'+(sel?r.color:'#1a2e1a'),r.label);
      var nt=cs('span','font-size:10px;color:#6a8a6a;margin-left:6px',r.note);
      ap(inf,nm2,nt);
      var ck=cs('div','width:18px;height:18px;border-radius:50%;border:2px solid '+(sel?r.color:'#d4e8d4')+';background:'+(sel?r.color:'transparent')+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0',sel?'✓':'');
      ap(btn,cs('span','font-size:26px;flex-shrink:0',r.emoji),inf);
      if(sel)ap(btn,cs('span','font-size:11px;font-weight:700;color:'+r.color+';flex-shrink:0','+'+r.pts+'pt'));
      ap(btn,ck);ap(mc,btn);
    });
    if(meals[key])ap(mc,cs('div','padding:10px 12px;background:#edf7ed;border-radius:10px;font-size:11px;color:#3a8a5a;font-weight:600;text-align:center','✅ 今日の食事を記録しました'));
    ap(con,mc);

    var mhc=ce('div');mhc.className='card';
    ap(mhc,cs('div','','').appendChild(document.createTextNode('')));
    var mhl=cs('div','');mhl.className='lbl';mhl.textContent='食事履歴（直近7日）';
    var mhr=cs('div','display:flex;gap:6px;justify-content:space-between');
    for(var qi=0;qi<7;qi++){
      var qd=new Date();qd.setDate(qd.getDate()-(6-qi));
      var qk=toKey(qd);
      var qr=MEALS.find(function(x){return x.id===meals[qk];})||null;
      var qc=cs('div','flex:1;display:flex;flex-direction:column;align-items:center;gap:3px');
      ap(qc,cs('span','font-size:18px;opacity:'+(qr?1:0.2),qr?qr.emoji:'・'),cs('div','font-size:8px;color:'+(qk===key?'#3a8a5a':'#6a8a6a')+';font-weight:'+(qk===key?700:400),DOW[(qd.getDay()+6)%7]));
      ap(mhr,qc);
    }
    ap(mhc,mhl,mhr);ap(con,mhc);
  }

  else if(tab==='record'){
    // Weight
    var wc=ce('div');wc.className='card';wc.style.marginBottom='14px';
    var wlbl=cs('div','');wlbl.className='lbl';wlbl.textContent='⚖️ 体重記録';ap(wc,wlbl);
    var wnav=cs('div','display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:#edf7ed;border-radius:10px;padding:8px 12px');
    var wprev=cs('button','border:none;background:none;font-size:18px;cursor:pointer;color:#3a8a5a;padding:0 4px','‹');
    wprev.addEventListener('click',function(){wOff--;render();});
    var wdlbl=cs('div','font-size:12px;font-weight:700',wOff===0?'今日':wOff===-1?'昨日':addDays(new Date(),wOff).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}));
    var wnxt=cs('button','border:none;background:none;font-size:18px;cursor:pointer;color:'+(wOff===0?'#d4e8d4':'#3a8a5a')+';padding:0 4px','›');
    wnxt.disabled=wOff===0;wnxt.addEventListener('click',function(){if(wOff<0){wOff++;render();}});
    ap(wnav,wprev,wdlbl,wnxt);ap(wc,wnav);
    if(lw){
      var wsr=cs('div','display:flex;gap:10px;margin-bottom:12px');
      var wlb=cs('div','flex:1;background:#edf7ed;border-radius:10px;padding:10px 12px;text-align:center');
      ap(wlb,cs('div','font-size:9px;color:#6a8a6a;margin-bottom:2px','最新'),cs('div','font-size:20px;font-weight:800;color:#3a8a5a',lw+'kg'));
      ap(wsr,wlb);
      if(wd2!==null){
        var wdb=cs('div','flex:1;background:#edf7ed;border-radius:10px;padding:10px 12px;text-align:center');
        ap(wdb,cs('div','font-size:9px;color:#6a8a6a;margin-bottom:2px','記録開始から'),cs('div','font-size:20px;font-weight:800;color:'+(Number(wd2)<=0?'#3a8a5a':'#c05030'),(Number(wd2)>0?'+':'')+wd2+'kg'));
        ap(wsr,wdb);
      }
      ap(wc,wsr);
    }
    ap(wc,makeSVGChart(wh,'#3a8a5a',88));
    var winp=ce('input');winp.type='number';winp.step='0.1';winp.placeholder='体重を入力 (kg)';winp.value=wVal;
    winp.style.cssText='width:100%;padding:10px 12px;border-radius:9px;border:1.5px solid #d4e8d4;font-size:15px;font-weight:700;color:#1a2e1a;background:#f2f6f2;text-align:center;margin-top:12px;box-sizing:border-box';
    ap(wc,winp);
    var adjr=cs('div','display:flex;gap:5px;margin-top:8px');
    [[-0.5,'−0.5'],[-0.1,'−0.1'],[0.1,'+0.1'],[0.5,'+0.5']].forEach(function(pair){
      var ab=cs('button','flex:1;padding:10px 0;border-radius:9px;border:1.5px solid #d4e8d4;background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:'+(pair[0]<0?'#3a8a5a':'#c05030'),pair[1]);
      ab.addEventListener('click',function(){var cur=parseFloat(winp.value)||0;var nxt=Math.round((cur+pair[0])*10)/10;if(nxt>=30&&nxt<=300)winp.value=nxt;});
      ap(adjr,ab);
    });
    ap(wc,adjr);
    var wsb=ce('button');wsb.className='pbtn';wsb.textContent='この体重で記録';
    wsb.addEventListener('click',function(){
      var v=parseFloat(winp.value);if(isNaN(v)||v<30||v>300)return;
      var nw=Object.assign({},store.weights||{});nw[wTgt]=v;
      update(Object.assign({},store,{weights:nw}));
      wsb.textContent='✓ 記録しました';wsb.style.background='#5aaa78';
      setTimeout(function(){wsb.textContent='この体重で記録';wsb.style.background='#3a8a5a';},1500);
    });
    ap(wc,wsb);ap(con,wc);

    // Exercise
    var ec=ce('div');ec.className='card';ec.style.marginBottom='14px';
    var elbl=cs('div','');elbl.className='lbl';elbl.textContent='💪 運動記録（今日）';ap(ec,elbl);
    var maxV=Math.max.apply(null,ex14.map(function(x){return x.v;}).concat([1]));
    var br=cs('div','display:flex;align-items:flex-end;gap:4px;height:56px;margin-bottom:14px');
    ex14.forEach(function(d){
      var isT=d.key===key;
      var col=cs('div','flex:1;display:flex;flex-direction:column;align-items:center;gap:3px');
      if(d.v>0)ap(col,cs('div','font-size:7px;color:#3a8a5a;font-weight:600',String(d.v)));
      ap(col,cs('div','width:100%;height:'+Math.max(3,(d.v/maxV)*44)+'px;background:'+(isT?'#3a8a5a':d.v>0?'#c8e6c9':'#d4e8d4')+';border-radius:4px'));
      ap(col,cs('div','font-size:7px;color:'+(isT?'#3a8a5a':'#6a8a6a')+';font-weight:'+(isT?700:400),d.label));
      ap(br,col);
    });
    ap(ec,cs('div','font-size:10px;color:#6a8a6a;margin-bottom:6px','直近14日の運動時間（分）'),br);
    ap(ec,cs('div','font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:1px;margin-bottom:8px','種目'));
    var tg=cs('div','display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px');
    EX_TYPES.forEach(function(t){
      var sel=exType&&exType.id===t.id;
      var tb=ce('button');
      tb.style.cssText='padding:8px 4px;border-radius:10px;border:1.5px solid '+(sel?'#3a8a5a':'#d4e8d4')+';background:'+(sel?'#edf7ed':'#fff')+';cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px';
      tb.addEventListener('click',(function(et){return function(){exType=et;render();};})(t));
      ap(tb,cs('span','font-size:20px',t.emoji),cs('span','font-size:9px;font-weight:'+(sel?700:500)+';color:'+(sel?'#3a8a5a':'#6a8a6a'),t.label));
      ap(tg,tb);
    });
    ap(ec,tg);
    ap(ec,cs('div','font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:1px;margin-bottom:8px','時間'));
    var drow=cs('div','margin-bottom:14px');
    EX_DURS.forEach(function(d){
      var sel=exDur===d;
      var db=ce('button');
      db.style.cssText='padding:8px 14px;border-radius:9px;border:1.5px solid '+(sel?'#3a8a5a':'#d4e8d4')+';background:'+(sel?'#edf7ed':'#fff')+';font-size:13px;font-weight:'+(sel?700:500)+';color:'+(sel?'#3a8a5a':'#6a8a6a')+';cursor:pointer;margin-right:6px;margin-bottom:6px';
      db.textContent=d+'分';
      db.addEventListener('click',(function(dv){return function(){exDur=dv;render();};})(d));
      ap(drow,db);
    });
    ap(ec,drow);
    var esb=ce('button');esb.className='pbtn';esb.disabled=!exType||!exDur;esb.textContent=!exType||!exDur?'種目と時間を選んでください':'記録する';
    esb.addEventListener('click',function(){
      if(!exType||!exDur)return;
      var ent={id:Date.now(),date:key,type:exType.label,emoji:exType.emoji,duration:exDur};
      update(Object.assign({},store,{exercises:(store.exercises||[]).concat([ent])}));
      exType=null;exDur=null;
    });
    ap(ec,esb);
    if(texLogs.length>0){
      var tld=cs('div','margin-top:14px');
      ap(tld,cs('div','font-size:10px;color:#6a8a6a;font-weight:700;margin-bottom:7px','今日の記録'));
      texLogs.forEach(function(e){
        var row=cs('div','display:flex;align-items:center;gap:10px;background:#edf7ed;border-radius:9px;padding:8px 12px;margin-bottom:6px');
        var inf2=cs('div','flex:1');
        ap(inf2,cs('span','font-size:12px;font-weight:700',e.type),cs('span','font-size:12px;color:#3a8a5a;font-weight:700;margin-left:6px',e.duration+'分'));
        var del=cs('button','border:none;background:none;color:#6a8a6a;font-size:18px;cursor:pointer;padding:0 4px;line-height:1','×');
        del.addEventListener('click',(function(eid){return function(){update(Object.assign({},store,{exercises:(store.exercises||[]).filter(function(x){return x.id!==eid;})}));};})(e.id));
        ap(row,cs('span','font-size:18px',e.emoji),inf2,del);ap(tld,row);
      });
      ap(ec,tld);
    }
    ap(con,ec);
    if(exLogs.length>0){
      var ehc=ce('div');ehc.className='card';
      var ehl=cs('div','');ehl.className='lbl';ehl.textContent='運動履歴（直近10件）';ap(ehc,ehl);
      var ehl2=[].concat(exLogs).reverse().slice(0,10);
      ehl2.forEach(function(e,i){
        var row=cs('div','display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:'+(i<ehl2.length-1?'1px solid #d4e8d4':'none'));
        ap(row,cs('div','font-size:9px;color:#6a8a6a;flex-shrink:0;width:38px',e.date.slice(5)),cs('span','font-size:14px',e.emoji),cs('div','flex:1;font-size:12px',e.type),cs('div','font-size:11px;font-weight:700;color:#3a8a5a;flex-shrink:0',e.duration+'分'));
        ap(ehc,row);
      });
      ap(con,ehc);
    }
  }

  else if(tab==='progress'){
    var rkc=ce('div');rkc.className='card';rkc.style.cssText='margin-bottom:14px;background:linear-gradient(135deg,'+rk.color+'26,#fff);border-color:'+rk.color+'66';
    var rkrow=cs('div','display:flex;justify-content:space-between;align-items:center');
    var rkl=cs('div','');
    var rklbl=cs('div','');rklbl.className='lbl';rklbl.textContent='今週のランク';
    ap(rkl,rklbl,cs('div','font-size:22px;font-weight:800;color:'+rk.color,rk.emoji+' '+rk.name),cs('div','font-size:11px;color:#6a8a6a;margin-top:2px','週平均達成率: '+wavg+'%'));
    var rkr=cs('div','text-align:right');
    if(nrk)ap(rkr,cs('div','font-size:9px;color:#6a8a6a','次のランクまで'),cs('div','font-size:20px;font-weight:800;color:'+nrk.color,(nrk.min-wavg)+'%'),cs('div','font-size:9px;color:#6a8a6a',nrk.emoji+' '+nrk.name));
    else ap(rkr,cs('div','font-size:12px;font-weight:800;color:#3a8a5a','最高ランク！💍'));
    ap(rkrow,rkl,rkr);ap(rkc,rkrow);ap(con,rkc);

    var wkc=ce('div');wkc.className='card';wkc.style.marginBottom='14px';
    var wkl=cs('div','');wkl.className='lbl';wkl.textContent='今週の達成率';
    var wkb=cs('div','display:flex;align-items:flex-end;gap:6px;height:62px');
    wd.forEach(function(k,i){
      var isT=k===key,isP=k<key;
      var col=cs('div','flex:1;display:flex;flex-direction:column;align-items:center;gap:4px');
      ap(col,cs('div','font-size:8px;color:'+(wps[i]>0?'#3a8a5a':'#6a8a6a')+';font-weight:600',wps[i]>0?wps[i]+'%':''));
      ap(col,cs('div','width:100%;height:'+Math.max(3,wps[i]*0.52)+'px;background:'+(isT?'#3a8a5a':wps[i]>0?'#c8e6c9':'#d4e8d4')+';border-radius:4px;opacity:'+(!isP&&!isT?0.3:1)));
      ap(col,cs('div','font-size:9px;color:'+(isT?'#3a8a5a':'#6a8a6a')+';font-weight:'+(isT?700:400),DOW[i]));
      ap(wkb,col);
    });
    ap(wkc,wkl,wkb);ap(con,wkc);

    ap(con,cs('div','font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:10px','今週のミッション'));
    ms.forEach(function(mission,i){
      var dn2=msDone[i];
      var mc2=ce('div');mc2.className='card';mc2.style.cssText='padding:12px 14px;margin-bottom:8px;border-color:'+(dn2?'#3a8a5a':'#d4e8d4')+';background:'+(dn2?'rgba(58,138,90,0.05)':'#fff');
      var mr2=cs('div','display:flex;align-items:center;gap:10px');
      var mi2=cs('div','flex:1');
      ap(mi2,cs('div','font-size:12px;font-weight:'+(dn2?800:500)+';color:'+(dn2?'#1a2e1a':'#6a8a6a'),mission.label),cs('div','font-size:10px;color:'+(dn2?'#3a8a5a':'#6a8a6a')+';margin-top:2px;font-weight:600',dn2?'✅ クリア！+50XP':'未達成'));
      ap(mr2,cs('span','font-size:20px',dn2?'🏆':'🎯'),mi2);ap(mc2,mr2);ap(con,mc2);
    });

    var rmc=ce('div');rmc.className='card';
    var rml=cs('div','');rml.className='lbl';rml.textContent='全レベルロードマップ';ap(rmc,rml);
    LEVELS.forEach(function(lv2){
      var unl=xp>=lv2.xp,isc=lv2.lv===cl.lv;
      var row=cs('div','display:flex;align-items:center;gap:10px;opacity:'+(unl?1:0.4)+';padding:6px 10px;border-radius:8px;background:'+(isc?'#edf7ed':'transparent')+';border:1px solid '+(isc?'#c8e6c9':'transparent'));
      ap(row,cs('div','width:24px;height:24px;border-radius:50%;background:'+(unl?'#3a8a5a':'#d4e8d4')+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0',String(lv2.lv)));
      var inf3=cs('div','flex:1');
      ap(inf3,cs('div','font-size:12px;font-weight:'+(isc?800:500)+';color:'+(isc?'#1a2e1a':'#6a8a6a'),lv2.title),cs('div','font-size:9px;color:#6a8a6a',lv2.xp.toLocaleString()+' XP〜'));
      ap(row,inf3);
      if(isc)ap(row,cs('span','font-size:10px;color:#3a8a5a;font-weight:700','← 現在'));
      else if(unl)ap(row,cs('span','font-size:13px','✅'));
      ap(rmc,row);
    });
    ap(con,rmc);
  }

  ap(con,cs('div','text-align:center;margin-top:24px;font-size:10px;color:#6a8a6a','毎日少しずつ、必ず変わる 🌿'));
  ap(wrap,con);
  var root=ge('root');root.innerHTML='';root.appendChild(wrap);
}

function init(){
  var s=loadStore();
  store=Object.keys(s).length?s:blank();
  render();
}

init();
</script>
</body>
