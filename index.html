<title>新郎ダイエットトラッカー</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233a8a5a'/%3E%3Ctext y='78' font-size='68' x='50' text-anchor='middle'%3E🤵%3C/text%3E%3C/svg%3E"/>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#f2f6f2;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit}
input:focus{outline:none;border-color:#3a8a5a!important;box-shadow:0 0 0 3px rgba(58,138,90,0.12)}
::-webkit-scrollbar{display:none}
@keyframes fadeUp{
  0%{opacity:0;transform:translateX(-50%) translateY(10px)}
  15%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}100%{opacity:0}
}

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const G={
  bg:"#f2f6f2",card:"#fff",pri:"#3a8a5a",priMid:"#5aaa78",
  priLight:"#c8e6c9",priXLight:"#edf7ed",text:"#1a2e1a",
  muted:"#6a8a6a",border:"#d4e8d4",
};

// ── DAILY TASKS ───────────────────────────────────────────────────────────────
const TASKS=[
  {id:"breakfast",emoji:"🍳",label:"朝ごはんを食べた",    points:20,note:"代謝UP・食べすぎ防止"},
  {id:"water",    emoji:"💧",label:"水を1.5L飲む",        points:10},
  {id:"vegFirst", emoji:"🥗",label:"野菜から先に食べた",  points:10},
  {id:"noLateEat",emoji:"🌙",label:"21時以降食べなかった",points:15},
  {id:"snack",    emoji:"🍪",label:"間食を我慢 or 半分に",points:15},
  {id:"walk",     emoji:"🚶",label:"15〜30分歩いた",      points:20},
  {id:"exercise", emoji:"💪",label:"筋トレをした",        points:25},
  {id:"weigh",    emoji:"⚖️",label:"体重を記録した",      points: 5},
];
const BASE_TOTAL=TASKS.reduce((s,t)=>s+t.points,0);
const streakMult=(s)=>s>=30?2.0:s>=7?1.5:s>=3?1.2:1.0;

// ── LEVELS ────────────────────────────────────────────────────────────────────
const LEVELS=[
  {lv:1, xp:0,    title:"見習い新郎"},
  {lv:2, xp:200,  title:"意識高め新郎"},
  {lv:3, xp:500,  title:"ダイエット戦士"},
  {lv:4, xp:900,  title:"習慣マスター"},
  {lv:5, xp:1400, title:"鋼の意志"},
  {lv:6, xp:2000, title:"体型番長"},
  {lv:7, xp:2700, title:"スーツの申し子"},
  {lv:8, xp:3500, title:"伝説の花婿候補"},
  {lv:9, xp:4400, title:"ウェディング覇者"},
  {lv:10,xp:5500, title:"完璧な新郎 💍"},
];
const getLevel=(xp)=>{
  let cur=LEVELS[0],next=LEVELS[1];
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){cur=LEVELS[i];next=LEVELS[i+1]||null;break;}}
  return{cur,next};
};

// ── MISSIONS ──────────────────────────────────────────────────────────────────
const ALL_MISSIONS=[
  {id:"m1",label:"今週、朝ごはんを5日以上食べる",     check:(d)=>d.filter(x=>x.breakfast).length>=5},
  {id:"m2",label:"今週、筋トレを4回以上する",         check:(d)=>d.filter(x=>x.exercise).length>=4},
  {id:"m3",label:"今週、毎日水1.5Lを達成する",        check:(d)=>d.every(x=>x.water)},
  {id:"m4",label:"今週、間食ゼロの日を3日作る",       check:(d)=>d.filter(x=>x.snack).length>=3},
  {id:"m5",label:"今週、21時以降食べない日を5日作る", check:(d)=>d.filter(x=>x.noLateEat).length>=5},
  {id:"m6",label:"今週、毎日体重を記録する",          check:(d)=>d.every(x=>x.weigh)},
  {id:"m7",label:"今週、ウォーキングを5回以上する",   check:(d)=>d.filter(x=>x.walk).length>=5},
];
const getWeekMissions=(w)=>[ALL_MISSIONS[w%ALL_MISSIONS.length],ALL_MISSIONS[(w+1)%ALL_MISSIONS.length]];

// ── RANKS ─────────────────────────────────────────────────────────────────────
const RANKS=[
  {name:"Bronze", min:0,  color:"#a06840",emoji:"🥉"},
  {name:"Silver", min:40, color:"#8a9aaa",emoji:"🥈"},
  {name:"Gold",   min:65, color:"#c9a84c",emoji:"🥇"},
  {name:"Wedding",min:85, color:"#3a8a5a",emoji:"💍"},
];
const getRank    =(p)=>[...RANKS].reverse().find(r=>p>=r.min)||RANKS[0];
const getNextRank=(r)=>RANKS[RANKS.findIndex(x=>x.name===r.name)+1]||null;

// ── MEAL RATINGS ──────────────────────────────────────────────────────────────
const MEAL_RATINGS=[
  {id:5,emoji:"😇",label:"完璧",   note:"朝昼夜◎・間食なし",         color:"#3a8a5a",pts:20},
  {id:4,emoji:"🙂",label:"良い",   note:"3食・少し間食あり程度",       color:"#5aaa78",pts:15},
  {id:3,emoji:"😐",label:"普通",   note:"1食抜き or 間食やや多め",     color:"#c9a84c",pts:8},
  {id:2,emoji:"😓",label:"よくない",note:"2食抜き or 夜遅く食べた",   color:"#d08040",pts:3},
  {id:1,emoji:"🍕",label:"ダメ",   note:"食べすぎ・ジャンク・反省あり",color:"#c05030",pts:0},
];

// ── EXERCISE ──────────────────────────────────────────────────────────────────
const EX_TYPES=[
  {id:"strength",emoji:"💪",label:"筋トレ"},
  {id:"walk",    emoji:"🚶",label:"ウォーキング"},
  {id:"run",     emoji:"🏃",label:"ランニング"},
  {id:"stretch", emoji:"🧘",label:"ストレッチ"},
  {id:"swim",    emoji:"🏊",label:"水泳"},
  {id:"cycle",   emoji:"🚴",label:"サイクリング"},
  {id:"other",   emoji:"⚡",label:"その他"},
];
const EX_DURATIONS=[10,20,30,45,60,90];

const DOW=["月","火","水","木","金","土","日"];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const toKey=(d)=>d.toISOString().slice(0,10);
const todayKey=()=>toKey(new Date());
const getISOWeek=(d)=>{
  const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  const w=new Date(t.getFullYear(),0,4);
  return Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7)+1;
};
const getWeekDays=()=>{
  const now=new Date(),dow=(now.getDay()+6)%7;
  return Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-dow+i);return toKey(d);});
};
const fmt=(d)=>d.toISOString().slice(0,10);
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};

// ── STORAGE ───────────────────────────────────────────────────────────────────
// { tasks:{date:{taskId:bool}}, weights:{date:number}, meals:{date:ratingId}, exercises:[{id,date,type,duration}] }
const SK="groomDiet5";
const loadStore=()=>{try{return JSON.parse(localStorage.getItem(SK)||"{}");}catch{return{};}};
const blankStore=()=>({tasks:{},weights:{},meals:{},exercises:[]});
const saveStore=(s)=>{try{localStorage.setItem(SK,JSON.stringify(s));}catch{}};

// ── LINE CHART ────────────────────────────────────────────────────────────────
function LineChart({data,color=G.pri,height=90}){
  if(!data||data.length<2)return(
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:G.muted,fontSize:11}}>
      2件以上記録するとグラフが表示されます
    </div>
  );
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const pad=26,W=320,H=height;
  const px=(i)=>pad+(i/(data.length-1))*(W-pad*2);
  const py=(v)=>mx===mn?H/2:H-pad-(((v-mn)/(mx-mn))*(H-pad*2));
  const pts=data.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
  const area=`M${px(0)},${py(data[0].v)} `+data.map((d,i)=>`L${px(i)},${py(d.v)}`).join(" ")+` L${px(data.length-1)},${H} L${px(0)},${H} Z`;
  const step=Math.ceil(data.length/6);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block"}}>
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#ag)"/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={px(i)} cy={py(d.v)} r="3.5" fill={color}/>
          {(i===0||i===data.length-1||i%step===0)&&<>
            <text x={px(i)} y={py(d.v)-8} textAnchor="middle" fontSize="8" fill={G.muted}>{d.v}</text>
            <text x={px(i)} y={H-1} textAnchor="middle" fontSize="7" fill={G.muted}>{d.label}</text>
          </>}
        </g>
      ))}
    </svg>
  );
}

// ── WEIGHT INPUT COMPONENT ────────────────────────────────────────────────────
function WeightInput({value,onChange,onSave,saved}){
  const adj=(delta)=>{
    const cur=parseFloat(value)||0;
    const next=Math.round((cur+delta)*10)/10;
    if(next>=30&&next<=300)onChange(String(next));
  };
  const BtnAdj=({d,label})=>(
    <button onClick={()=>adj(d)} style={{flex:1,padding:"10px 0",borderRadius:9,border:`1.5px solid ${G.border}`,background:G.card,fontSize:12,fontWeight:700,color:d<0?G.pri:"#c05030",cursor:"pointer"}}>
      {label}
    </button>
  );
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input type="number" step="0.1" placeholder="体重を入力 (kg)"
          value={value} onChange={e=>onChange(e.target.value)}
          style={{flex:1,padding:"10px 12px",borderRadius:9,border:`1.5px solid ${G.border}`,fontSize:15,fontWeight:700,color:G.text,background:G.bg,textAlign:"center"}}/>
        <span style={{fontSize:13,color:G.muted,flexShrink:0}}>kg</span>
      </div>
      <div style={{display:"flex",gap:5}}>
        <BtnAdj d={-0.5} label="−0.5"/>
        <BtnAdj d={-0.1} label="−0.1"/>
        <BtnAdj d={+0.1} label="+0.1"/>
        <BtnAdj d={+0.5} label="+0.5"/>
      </div>
      <button onClick={onSave} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:saved?"#5aaa78":G.pri,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",transition:"background 0.2s"}}>
        {saved?"✓ 記録しました":"この体重で記録"}
      </button>
    </div>
  );
}

// ── EXERCISE LOGGER ───────────────────────────────────────────────────────────
function ExerciseLogger({onSave}){
  const [selType,setSelType]=useState(null);
  const [selDur, setSelDur] =useState(null);
  const [saved,  setSaved]  =useState(false);

  const handleSave=()=>{
    if(!selType||!selDur)return;
    onSave({type:selType,duration:selDur});
    setSaved(true);
    setTimeout(()=>{setSaved(false);setSelType(null);setSelDur(null);},1200);
  };

  return(
    <div>
      {/* Type buttons */}
      <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:1,marginBottom:8}}>種目</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:14}}>
        {EX_TYPES.map(t=>{
          const sel=selType?.id===t.id;
          return(
            <button key={t.id} onClick={()=>setSelType(t)} style={{padding:"8px 4px",borderRadius:10,border:`1.5px solid ${sel?G.pri:G.border}`,background:sel?G.priXLight:G.card,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.15s"}}>
              <span style={{fontSize:20}}>{t.emoji}</span>
              <span style={{fontSize:9,fontWeight:sel?700:500,color:sel?G.pri:G.muted}}>{t.label}</span>
            </button>
          );
        })}
      </div>

      {/* Duration buttons */}
      <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:1,marginBottom:8}}>時間</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        {EX_DURATIONS.map(dur=>{
          const sel=selDur===dur;
          return(
            <button key={dur} onClick={()=>setSelDur(dur)} style={{padding:"8px 14px",borderRadius:9,border:`1.5px solid ${sel?G.pri:G.border}`,background:sel?G.priXLight:G.card,fontSize:13,fontWeight:sel?700:500,color:sel?G.pri:G.muted,cursor:"pointer",transition:"all 0.15s"}}>
              {dur}分
            </button>
          );
        })}
      </div>

      <button onClick={handleSave} disabled={!selType||!selDur} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:saved?"#5aaa78":(!selType||!selDur)?"#c8e6c9":G.pri,color:"#fff",fontSize:13,fontWeight:700,cursor:(!selType||!selDur)?"default":"pointer",transition:"background 0.2s"}}>
        {saved?"✓ 記録しました！":(!selType||!selDur)?"種目と時間を選んでください":"記録する"}
      </button>
    </div>
  );
}

// ── MEAL RATER ────────────────────────────────────────────────────────────────
function MealRater({current,onRate}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {MEAL_RATINGS.map(r=>{
        const sel=current===r.id;
        return(
          <button key={r.id} onClick={()=>onRate(r.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,border:`2px solid ${sel?r.color:G.border}`,background:sel?r.color+"15":G.card,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
            <span style={{fontSize:26,flexShrink:0}}>{r.emoji}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                <span style={{fontSize:14,fontWeight:700,color:sel?r.color:G.text}}>{r.label}</span>
                <span style={{fontSize:10,color:G.muted}}>{r.note}</span>
              </div>
            </div>
            {sel&&<span style={{fontSize:11,fontWeight:700,color:r.color,flexShrink:0}}>+{r.pts}pt</span>}
            <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${sel?r.color:G.border}`,background:sel?r.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",flexShrink:0}}>
              {sel?"✓":""}
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [store,setStore]=useState(()=>{const s=loadStore();return Object.keys(s).length?s:blankStore();});
  const [tab,setTab]=useState("today");
  const [lvAnim,setLvAnim]=useState(null);
  const prevLvRef=useRef(null);

  // weight state
  const [wInput,setWInput]=useState("");
  const [wSaved,setWSaved]=useState(false);
  const [wDateOffset,setWDateOffset]=useState(0); // 0=today, -1=yesterday...

  const key=todayKey();

  useEffect(()=>{
    const s=loadStore();
    setStore(Object.keys(s).length?s:blankStore());
  },[]);

  // sync weight input when offset changes
  const wTargetDate=fmt(addDays(new Date(),wDateOffset));
  useEffect(()=>{
    const w=(store.weights||{})[wTargetDate];
    if(w)setWInput(String(w));
    else{
      // find most recent weight
      const entries=Object.entries(store.weights||{}).sort(([a],[b])=>b.localeCompare(a));
      const latest=entries.find(([d])=>d<=wTargetDate);
      setWInput(latest?String(latest[1]):"");
    }
  },[wDateOffset,store.weights]);

  const tasks   =store.tasks||{};
  const weights =store.weights||{};
  const meals   =store.meals||{};
  const exLogs  =store.exercises||[];
  const checked =tasks[key]||{};

  const streak=(()=>{
    let c=0;const now=new Date();
    for(let i=0;;i++){
      const d=new Date(now);d.setDate(d.getDate()-i);
      const p=TASKS.filter(t=>(tasks[toKey(d)]||{})[t.id]).reduce((s,t)=>s+t.points,0);
      if(p>0)c++;else break;
    }
    return c;
  })();

  const mult      =streakMult(streak);
  const todayBase =TASKS.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const mealRating=MEAL_RATINGS.find(r=>r.id===meals[key]);
  const mealPts   =mealRating?mealRating.pts:0;
  const todayPts  =Math.round((todayBase+mealPts)*mult);
  const todayPct  =Math.round((todayBase/BASE_TOTAL)*100);
  const doneNum   =TASKS.filter(t=>checked[t.id]).length;

  const totalXP=Object.entries(tasks).reduce((sum,[date,day])=>{
    const mp=(MEAL_RATINGS.find(r=>r.id===(meals[date]||0))?.pts)||0;
    return sum+TASKS.filter(t=>day[t.id]).reduce((s,t)=>s+t.points,0)+mp;
  },0);
  const {cur:curLv,next:nextLv}=getLevel(totalXP);
  const xpInLevel=totalXP-curLv.xp;
  const xpNeeded=nextLv?nextLv.xp-curLv.xp:1;
  const lvPct=nextLv?Math.min(100,Math.round((xpInLevel/xpNeeded)*100)):100;

  useEffect(()=>{
    if(prevLvRef.current!==null&&curLv.lv>prevLvRef.current){
      setLvAnim(curLv);setTimeout(()=>setLvAnim(null),3000);
    }
    prevLvRef.current=curLv.lv;
  },[curLv.lv]);

  const weekDays   =getWeekDays();
  const weekNum    =getISOWeek(new Date());
  const missions   =getWeekMissions(weekNum);
  const weekDayData=weekDays.map(k=>tasks[k]||{});
  const weekPcts   =weekDays.map(k=>{
    const d=tasks[k]||{};
    return Math.round((TASKS.filter(t=>d[t.id]).reduce((s,t)=>s+t.points,0)/BASE_TOTAL)*100);
  });
  const weekAvg  =Math.round(weekPcts.reduce((s,v)=>s+v,0)/7);
  const rank     =getRank(weekAvg);
  const nextRank =getNextRank(rank);
  const missionsDone=missions.map(m=>m.check(weekDayData.map(d=>
    Object.fromEntries(TASKS.map(t=>[t.id,!!d[t.id]]))
  )));

  // weight chart
  const weightHistory=Object.entries(weights).filter(([,v])=>v!=null)
    .sort(([a],[b])=>a.localeCompare(b)).slice(-30)
    .map(([date,v])=>({label:date.slice(5),v}));
  const latestW=weightHistory.length?weightHistory[weightHistory.length-1].v:null;
  const firstW =weightHistory.length?weightHistory[0].v:null;
  const wDiff  =latestW&&firstW?(latestW-firstW).toFixed(1):null;

  // exercise chart (14 days)
  const exByDay={};
  exLogs.forEach(e=>{exByDay[e.date]=(exByDay[e.date]||0)+Number(e.duration||0);});
  const ex14=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));
    const k=toKey(d);
    return{label:DOW[(d.getDay()+6)%7],v:exByDay[k]||0,key:k};
  });
  const todayExLogs=exLogs.filter(e=>e.date===key);

  // handlers
  const toggle=(id)=>{
    const updated={...checked,[id]:!checked[id]};
    const ns={...store,tasks:{...tasks,[key]:updated}};
    setStore(ns);saveStore(ns);
  };
  const saveWeight=()=>{
    const v=parseFloat(wInput);
    if(isNaN(v)||v<30||v>300)return;
    const ns={...store,weights:{...weights,[wTargetDate]:v}};
    setStore(ns);saveStore(ns);
    setWSaved(true);setTimeout(()=>setWSaved(false),1500);
  };
  const rateMeal=(ratingId)=>{
    const ns={...store,meals:{...meals,[key]:ratingId}};
    setStore(ns);saveStore(ns);
  };
  const saveExercise=({type,duration})=>{
    const entry={id:Date.now(),date:key,type:type.label,emoji:type.emoji,duration};
    const ns={...store,exercises:[...exLogs,entry]};
    setStore(ns);saveStore(ns);
  };
  const deleteEx=(id)=>{
    const ns={...store,exercises:exLogs.filter(e=>e.id!==id)};
    setStore(ns);saveStore(ns);
  };

  const card=(ex={})=>({background:G.card,borderRadius:14,padding:"14px",boxShadow:"0 1px 10px rgba(40,90,60,0.08)",border:`1px solid ${G.border}`,...ex});
  const TABS=[["today","今日"],["meal","食事"],["record","体重・運動"],["progress","進捗"]];

  return(
    <div style={{minHeight:"100vh",background:G.bg,padding:"20px 16px 40px",maxWidth:480,margin:"0 auto",color:G.text}}>

      {/* Level-up toast */}
      {lvAnim&&<div style={{position:"fixed",top:24,left:"50%",background:G.pri,color:"#fff",padding:"12px 24px",borderRadius:20,fontSize:13,fontWeight:800,zIndex:9999,boxShadow:"0 6px 24px rgba(40,130,80,0.45)",animation:"fadeUp 3s ease forwards",whiteSpace:"nowrap",pointerEvents:"none"}}>
        🎉 LEVEL UP! Lv{lvAnim.lv}「{lvAnim.title}」
      </div>}

      {/* Header */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,letterSpacing:3,color:G.muted,fontWeight:600,marginBottom:2}}>WEDDING DIET TRACKER</div>
        <div style={{fontSize:20,fontWeight:800}}>理想の新郎へ 🤵</div>
        <div style={{fontSize:11,color:G.muted,marginTop:2}}>{new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}</div>
      </div>

      {/* Level bar */}
      <div style={{...card({marginBottom:12,padding:"11px 14px"})}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:`linear-gradient(135deg,${G.priMid},${G.pri})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff"}}>{curLv.lv}</div>
            <div style={{fontSize:13,fontWeight:800}}>{curLv.title}</div>
          </div>
          <div style={{fontSize:11,color:G.pri,fontWeight:700}}>{totalXP.toLocaleString()} XP</div>
        </div>
        <div style={{background:G.priXLight,borderRadius:6,height:6,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${lvPct}%`,background:`linear-gradient(90deg,${G.priMid},${G.pri})`,borderRadius:6,transition:"width 0.6s ease"}}/>
        </div>
        {nextLv&&<div style={{fontSize:9,color:G.muted,marginTop:3,textAlign:"right"}}>Lv{nextLv.lv}まで {nextLv.xp-totalXP} XP</div>}
      </div>

      {/* Stats */}
      <div style={{display:"flex",gap:7,marginBottom:12}}>
        {[
          {icon:"🔥",val:`${streak}日`,   label:"継続中",   sub:mult>1?`×${mult}倍中`:null},
          {icon:rank.emoji,val:rank.name, label:"今週ランク",col:rank.color},
          {icon:"⚡",val:`${todayPts}pt`, label:"今日のXP"},
        ].map((s,i)=>(
          <div key={i} style={{...card({flex:1,padding:"9px 10px"})}}>
            <div style={{fontSize:17}}>{s.icon}</div>
            <div style={{fontSize:13,fontWeight:800,color:s.col||G.pri,marginTop:2}}>{s.val}</div>
            <div style={{fontSize:9,color:G.muted,marginTop:1}}>{s.label}</div>
            {s.sub&&<div style={{fontSize:8,color:G.priMid,fontWeight:600,marginTop:1}}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:3,marginBottom:14,background:G.priXLight,borderRadius:10,padding:3}}>
        {TABS.map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"7px 2px",borderRadius:8,border:"none",background:tab===id?G.card:"transparent",color:tab===id?G.pri:G.muted,fontWeight:tab===id?800:500,fontSize:10,cursor:"pointer",boxShadow:tab===id?"0 1px 4px rgba(40,90,60,0.1)":"none",transition:"all 0.15s"}}>
            {label}
          </button>
        ))}
      </div>

      {/* ══ TODAY ══════════════════════════════════════════════════════════════ */}
      {tab==="today"&&<>
        {/* Ring */}
        <div style={{...card({display:"flex",alignItems:"center",gap:16,marginBottom:12})}}>
          <div style={{position:"relative",width:70,height:70,flexShrink:0}}>
            <svg width="70" height="70" viewBox="0 0 70 70">
              <circle cx="35" cy="35" r="28" fill="none" stroke={G.priLight} strokeWidth="6"/>
              <circle cx="35" cy="35" r="28" fill="none" stroke={G.pri} strokeWidth="6"
                strokeDasharray={`${2*Math.PI*28}`}
                strokeDashoffset={`${2*Math.PI*28*(1-todayPct/100)}`}
                strokeLinecap="round" transform="rotate(-90 35 35)"
                style={{transition:"stroke-dashoffset 0.5s ease"}}/>
            </svg>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:13,fontWeight:800,color:G.pri}}>{todayPct}%</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:800,marginBottom:3}}>
              {todayPct===100?"完璧！満点達成🎉":todayPct>=80?"あと少し！":todayPct>=50?"いい調子！":"今日も頑張ろう！"}
            </div>
            <div style={{fontSize:11,color:G.muted}}>{doneNum}/{TASKS.length} タスク完了</div>
            {mealRating&&<div style={{marginTop:4,fontSize:11,color:mealRating.color,fontWeight:600}}>{mealRating.emoji} 食事: {mealRating.label}</div>}
            {mult>1&&<div style={{marginTop:5,fontSize:10,background:G.priXLight,display:"inline-block",padding:"2px 8px",borderRadius:10,color:G.pri,fontWeight:700}}>🔥 ×{mult}倍ボーナス中</div>}
          </div>
        </div>

        {/* Tasks */}
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {TASKS.map(task=>{
            const done=!!checked[task.id];
            const bpts=Math.round(task.points*mult);
            const isBreakfast=task.id==="breakfast";
            return(
              <button key={task.id} onClick={()=>toggle(task.id)} style={{
                display:"flex",alignItems:"center",gap:12,padding:"11px 14px",borderRadius:12,
                border:`1.5px solid ${done?G.pri:isBreakfast&&!done?"#e0a040":G.border}`,
                background:done?`${G.pri}0e`:isBreakfast&&!done?"#fffbf0":G.card,
                cursor:"pointer",textAlign:"left",transition:"all 0.18s",
              }}>
                <span style={{fontSize:20}}>{task.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:done?700:500,color:done?G.text:G.muted}}>{task.label}</div>
                  {isBreakfast&&!done&&<div style={{fontSize:9,color:"#c08020",marginTop:2}}>{task.note}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:11,fontWeight:700,color:done?G.pri:isBreakfast?"#c08020":G.border}}>+{bpts}pt</div>
                  {mult>1&&<div style={{fontSize:8,color:G.priMid}}>base {task.points}</div>}
                </div>
                <div style={{width:20,height:20,borderRadius:"50%",background:done?G.pri:G.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",flexShrink:0,transition:"background 0.18s"}}>
                  {done?"✓":""}
                </div>
              </button>
            );
          })}
        </div>

        {/* Meal shortcut */}
        <div style={{...card({marginTop:12,padding:"11px 14px",cursor:"pointer"}),display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>setTab("meal")}>
          <span style={{fontSize:22}}>{mealRating?mealRating.emoji:"🍽️"}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:G.text}}>{mealRating?"食事記録: "+mealRating.label:"食事の記録をつける"}</div>
            <div style={{fontSize:10,color:G.muted,marginTop:1}}>{mealRating?`+${mealRating.pts}pt獲得`:"「食事」タブで記録 →"}</div>
          </div>
        </div>
      </>}

      {/* ══ MEAL ═══════════════════════════════════════════════════════════════ */}
      {tab==="meal"&&<>
        <div style={{...card({marginBottom:14})}}>
          <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>🍽️ 今日の食事</div>
          <div style={{fontSize:11,color:G.muted,marginBottom:14}}>今日の食事全体を振り返って選んでください</div>
          <MealRater current={meals[key]} onRate={rateMeal}/>
          {meals[key]&&(
            <div style={{marginTop:12,padding:"10px 12px",background:G.priXLight,borderRadius:10,fontSize:11,color:G.pri,fontWeight:600,textAlign:"center"}}>
              ✅ 今日の食事を記録しました
            </div>
          )}
        </div>

        {/* Meal history */}
        {Object.keys(meals).length>0&&(
          <div style={{...card()}}>
            <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>食事履歴（直近7日）</div>
            <div style={{display:"flex",gap:6,justifyContent:"space-between"}}>
              {Array.from({length:7},(_,i)=>{
                const d=new Date();d.setDate(d.getDate()-(6-i));
                const k=toKey(d);
                const r=MEAL_RATINGS.find(x=>x.id===meals[k]);
                const isToday=k===key;
                return(
                  <div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <span style={{fontSize:18,opacity:r?1:0.2}}>{r?r.emoji:"・"}</span>
                    <div style={{fontSize:8,color:isToday?G.pri:G.muted,fontWeight:isToday?700:400}}>
                      {DOW[(d.getDay()+6)%7]}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </>}

      {/* ══ RECORD (体重・運動) ══════════════════════════════════════════════════ */}
      {tab==="record"&&<>
        {/* Weight */}
        <div style={{...card({marginBottom:14})}}>
          <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:12}}>⚖️ 体重記録</div>

          {/* Date selector */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,background:G.priXLight,borderRadius:10,padding:"8px 12px"}}>
            <button onClick={()=>setWDateOffset(wDateOffset-1)} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:G.pri,padding:"0 4px"}}>‹</button>
            <div style={{fontSize:12,fontWeight:700,color:G.text}}>
              {wDateOffset===0?"今日":wDateOffset===-1?"昨日":
                addDays(new Date(),wDateOffset).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}
            </div>
            <button onClick={()=>setWDateOffset(Math.min(0,wDateOffset+1))} style={{border:"none",background:"none",fontSize:18,cursor:"pointer",color:wDateOffset===0?G.border:G.pri,padding:"0 4px"}} disabled={wDateOffset===0}>›</button>
          </div>

          {/* Summary */}
          {latestW&&(
            <div style={{display:"flex",gap:10,marginBottom:12}}>
              <div style={{flex:1,background:G.priXLight,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                <div style={{fontSize:9,color:G.muted,marginBottom:2}}>最新</div>
                <div style={{fontSize:20,fontWeight:800,color:G.pri}}>{latestW}<span style={{fontSize:11}}>kg</span></div>
              </div>
              {wDiff!==null&&(
                <div style={{flex:1,background:G.priXLight,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:G.muted,marginBottom:2}}>記録開始から</div>
                  <div style={{fontSize:20,fontWeight:800,color:Number(wDiff)<=0?"#3a8a5a":"#c05030"}}>
                    {Number(wDiff)>0?"+":""}{wDiff}<span style={{fontSize:11}}>kg</span>
                  </div>
                </div>
              )}
            </div>
          )}

          <LineChart data={weightHistory} color={G.pri} height={90}/>
          <div style={{marginTop:12}}>
            <WeightInput value={wInput} onChange={setWInput} onSave={saveWeight} saved={wSaved}/>
          </div>
        </div>

        {/* Exercise */}
        <div style={{...card({marginBottom:14})}}>
          <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:12}}>💪 運動記録（今日）</div>

          {/* 14-day bar */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:G.muted,marginBottom:6}}>直近14日の運動時間（分）</div>
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:56}}>
              {ex14.map((d,i)=>{
                const isToday=d.key===key;
                const maxV=Math.max(...ex14.map(x=>x.v),1);
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    {d.v>0&&<div style={{fontSize:7,color:G.pri,fontWeight:600}}>{d.v}</div>}
                    <div style={{width:"100%",height:Math.max(3,(d.v/maxV)*44),background:isToday?G.pri:d.v>0?G.priLight:G.border,borderRadius:4,transition:"height 0.3s"}}/>
                    <div style={{fontSize:7,color:isToday?G.pri:G.muted,fontWeight:isToday?700:400}}>{d.label}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <ExerciseLogger onSave={saveExercise}/>

          {todayExLogs.length>0&&(
            <div style={{marginTop:14}}>
              <div style={{fontSize:10,color:G.muted,fontWeight:700,marginBottom:7}}>今日の記録</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {todayExLogs.map(e=>(
                  <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,background:G.priXLight,borderRadius:9,padding:"8px 12px"}}>
                    <span style={{fontSize:18}}>{e.emoji}</span>
                    <div style={{flex:1}}>
                      <span style={{fontSize:12,fontWeight:700,color:G.text}}>{e.type}</span>
                      <span style={{fontSize:12,color:G.pri,fontWeight:700,marginLeft:6}}>{e.duration}分</span>
                    </div>
                    <button onClick={()=>deleteEx(e.id)} style={{border:"none",background:"none",color:G.muted,fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Exercise history */}
        {exLogs.length>0&&(
          <div style={{...card()}}>
            <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>運動履歴（直近10件）</div>
            <div style={{display:"flex",flexDirection:"column"}}>
              {[...exLogs].reverse().slice(0,10).map((e,i,arr)=>(
                <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:i<arr.length-1?`1px solid ${G.border}`:"none"}}>
                  <div style={{fontSize:9,color:G.muted,flexShrink:0,width:38}}>{e.date.slice(5)}</div>
                  <span style={{fontSize:14}}>{e.emoji}</span>
                  <div style={{flex:1,fontSize:12,color:G.text}}>{e.type}</div>
                  <div style={{fontSize:11,fontWeight:700,color:G.pri,flexShrink:0}}>{e.duration}分</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </>}

      {/* ══ PROGRESS ════════════════════════════════════════════════════════════ */}
      {tab==="progress"&&<>
        {/* Rank */}
        <div style={{...card({marginBottom:14,background:`linear-gradient(135deg,${rank.color}15,${G.card})`,borderColor:rank.color+"40"})}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:4}}>今週のランク</div>
              <div style={{fontSize:22,fontWeight:800,color:rank.color}}>{rank.emoji} {rank.name}</div>
              <div style={{fontSize:11,color:G.muted,marginTop:2}}>週平均達成率: <b>{weekAvg}%</b></div>
            </div>
            <div style={{textAlign:"right"}}>
              {nextRank?(
                <><div style={{fontSize:9,color:G.muted}}>次のランクまで</div>
                  <div style={{fontSize:20,fontWeight:800,color:nextRank.color}}>{nextRank.min-weekAvg}%</div>
                  <div style={{fontSize:9,color:G.muted}}>{nextRank.emoji} {nextRank.name}</div>
                </>
              ):<div style={{fontSize:12,fontWeight:800,color:G.pri}}>最高ランク！💍</div>}
            </div>
          </div>
        </div>

        {/* Week chart */}
        <div style={{...card({marginBottom:14})}}>
          <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>今週の達成率</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:62}}>
            {weekDays.map((k,i)=>{
              const isToday=k===todayKey(),isPast=k<todayKey();
              return(
                <div key={k} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{fontSize:8,color:weekPcts[i]>0?G.pri:G.muted,fontWeight:600}}>{weekPcts[i]>0?weekPcts[i]+"%":""}</div>
                  <div style={{width:"100%",height:Math.max(3,weekPcts[i]*0.52),background:isToday?G.pri:weekPcts[i]>0?G.priLight:G.border,borderRadius:4,opacity:!isPast&&!isToday?0.3:1,transition:"height 0.4s"}}/>
                  <div style={{fontSize:9,color:isToday?G.pri:G.muted,fontWeight:isToday?700:400}}>{DOW[i]}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Missions */}
        <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>今週のミッション</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {missions.map((m,i)=>{
            const done=missionsDone[i];
            return(
              <div key={m.id} style={{...card({padding:"12px 14px",borderColor:done?G.pri:G.border,background:done?`${G.pri}0d`:G.card})}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>{done?"🏆":"🎯"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:done?800:500,color:done?G.text:G.muted}}>{m.label}</div>
                    <div style={{fontSize:10,color:done?G.pri:G.muted,marginTop:2,fontWeight:600}}>{done?"✅ クリア！+50XP":"未達成"}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Level roadmap */}
        <div style={{...card()}}>
          <div style={{fontSize:10,color:G.muted,fontWeight:700,letterSpacing:2,marginBottom:10}}>全レベルロードマップ</div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {LEVELS.map(lv=>{
              const unlocked=totalXP>=lv.xp,isCur=lv.lv===curLv.lv;
              return(
                <div key={lv.lv} style={{display:"flex",alignItems:"center",gap:10,opacity:unlocked?1:0.4,padding:"6px 10px",borderRadius:8,background:isCur?G.priXLight:"transparent",border:isCur?`1px solid ${G.priLight}`:"1px solid transparent"}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:unlocked?G.pri:G.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>{lv.lv}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:isCur?800:500,color:isCur?G.text:G.muted}}>{lv.title}</div>
                    <div style={{fontSize:9,color:G.muted}}>{lv.xp.toLocaleString()} XP〜</div>
                  </div>
                  {isCur&&<span style={{fontSize:10,color:G.pri,fontWeight:700}}>← 現在</span>}
                  {unlocked&&!isCur&&<span style={{fontSize:13}}>✅</span>}
                </div>
              );
            })}
          </div>
        </div>
      </>}

      <div style={{textAlign:"center",marginTop:24,fontSize:10,color:G.muted}}>毎日少しずつ、必ず変わる 🌿</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if("serviceWorker" in navigator){
  const sw=`const C="diet-v2";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(["/"]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const blob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
