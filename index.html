<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="新郎Diet"/>
<meta name="theme-color" content="#3a8a5a"/>
<title>新郎ダイエットトラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f2f6f2;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#1a2e1a;-webkit-font-smoothing:antialiased}
button,input,select{font-family:inherit}
input:focus{outline:none;border-color:#3a8a5a!important;box-shadow:0 0 0 3px rgba(58,138,90,0.12)}
::-webkit-scrollbar{display:none}
#app{max-width:480px;margin:0 auto;padding:20px 16px 48px;min-height:100vh}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 10px rgba(40,90,60,0.08);border:1px solid #d4e8d4;margin-bottom:12px}
.label{font-size:10px;color:#6a8a6a;font-weight:700;letter-spacing:2px;margin-bottom:10px}
.tabs{display:flex;gap:3px;margin-bottom:14px;background:#edf7ed;border-radius:10px;padding:3px}
.tab{flex:1;padding:7px 2px;border-radius:8px;border:none;background:transparent;color:#6a8a6a;font-weight:500;font-size:10px;cursor:pointer;transition:all 0.15s}
.tab.active{background:#fff;color:#3a8a5a;font-weight:800;box-shadow:0 1px 4px rgba(40,90,60,0.1)}
.btn-pri{border:none;background:#3a8a5a;color:#fff;font-size:13px;font-weight:700;cursor:pointer;border-radius:9px;padding:10px 16px;transition:opacity 0.15s;width:100%}
.btn-pri:disabled{background:#c8e6c9;cursor:default}
.btn-adj{flex:1;padding:10px 0;border-radius:9px;border:1.5px solid #d4e8d4;background:#fff;font-size:12px;font-weight:700;cursor:pointer}
.stat-box{flex:1;padding:9px 10px}
.task-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:1.5px solid #d4e8d4;background:#fff;cursor:pointer;text-align:left;transition:all 0.18s;width:100%;margin-bottom:7px}
.task-btn.done{border-color:#3a8a5a;background:rgba(58,138,90,0.05)}
.task-btn.breakfast-pending{border-color:#e0a040;background:#fffbf0}
.check-circle{width:20px;height:20px;border-radius:50%;background:#d4e8d4;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;transition:background 0.18s}
.check-circle.done{background:#3a8a5a}
.meal-btn{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;border:2px solid #d4e8d4;background:#fff;cursor:pointer;text-align:left;transition:all 0.15s;width:100%;margin-bottom:7px}
.ex-type-btn{padding:8px 4px;border-radius:10px;border:1.5px solid #d4e8d4;background:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all 0.15s}
.ex-type-btn.sel{border-color:#3a8a5a;background:#edf7ed}
.ex-dur-btn{padding:8px 14px;border-radius:9px;border:1.5px solid #d4e8d4;background:#fff;font-size:13px;font-weight:500;color:#6a8a6a;cursor:pointer;transition:all 0.15s;margin-right:6px;margin-bottom:6px}
.ex-dur-btn.sel{border-color:#3a8a5a;background:#edf7ed;color:#3a8a5a;font-weight:700}
.setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(40,90,60,0.12)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:3px solid #c8e6c9;border-top:3px solid #3a8a5a;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes fadeUp{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
.toast{position:fixed;top:24px;left:50%;background:#3a8a5a;color:#fff;padding:12px 24px;border-radius:20px;font-size:13px;font-weight:800;z-index:9999;box-shadow:0 6px 24px rgba(40,130,80,0.45);animation:fadeUp 3s ease forwards;white-space:nowrap;pointer-events:none}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const GH_REPO = "ksuzukimailjp-arch/diet-tracker";
const GH_FILE = "data.json";
const GH_API  = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
const LS_TOKEN= "gh_token";
const LS_SHA  = "gh_sha";

const getToken=()=>localStorage.getItem(LS_TOKEN)||"";
const getSha  =()=>localStorage.getItem(LS_SHA)||"";
const setToken=(t)=>localStorage.setItem(LS_TOKEN,t);
const setSha  =(s)=>localStorage.setItem(LS_SHA,s);

async function ghFetch(){
  const res=await fetch(GH_API,{headers:{Authorization:`token ${getToken()}`,Accept:"application/vnd.github.v3+json"}});
  if(!res.ok)throw new Error("fetch_failed");
  const json=await res.json();
  setSha(json.sha);
  return JSON.parse(atob(json.content.replace(/\n/g,"")));
}
async function ghSave(store){
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(store,null,2))));
  const res=await fetch(GH_API,{method:"PUT",headers:{Authorization:`token ${getToken()}`,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify({message:"update data",content,sha:getSha()})});
  if(!res.ok)throw new Error("save_failed");
  const json=await res.json();
  setSha(json.content.sha);
}

// ── DATA ──────────────────────────────────────────────────────────────────────
const TASKS=[
  {id:"breakfast",emoji:"🍳",label:"朝ごはんを食べた",    points:20,note:"代謝UP・食べすぎ防止"},
  {id:"water",    emoji:"💧",label:"水を1.5L飲む",        points:10},
  {id:"vegFirst", emoji:"🥗",label:"野菜から先に食べた",  points:10},
  {id:"noLateEat",emoji:"🌙",label:"21時以降食べなかった",points:15},
  {id:"snack",    emoji:"🍪",label:"間食を我慢 or 半分に",points:15},
  {id:"walk",     emoji:"🚶",label:"15〜30分歩いた",      points:20},
  {id:"exercise", emoji:"💪",label:"筋トレをした",        points:25},
  {id:"weigh",    emoji:"⚖️",label:"体重を記録した",      points:5},
];
const BASE_TOTAL=TASKS.reduce((s,t)=>s+t.points,0);
const streakMult=(s)=>s>=30?2.0:s>=7?1.5:s>=3?1.2:1.0;

const LEVELS=[
  {lv:1,xp:0,title:"見習い新郎"},{lv:2,xp:200,title:"意識高め新郎"},
  {lv:3,xp:500,title:"ダイエット戦士"},{lv:4,xp:900,title:"習慣マスター"},
  {lv:5,xp:1400,title:"鋼の意志"},{lv:6,xp:2000,title:"体型番長"},
  {lv:7,xp:2700,title:"スーツの申し子"},{lv:8,xp:3500,title:"伝説の花婿候補"},
  {lv:9,xp:4400,title:"ウェディング覇者"},{lv:10,xp:5500,title:"完璧な新郎 💍"},
];
const getLevel=(xp)=>{
  let cur=LEVELS[0],next=LEVELS[1];
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){cur=LEVELS[i];next=LEVELS[i+1]||null;break;}}
  return{cur,next};
};

const ALL_MISSIONS=[
  {id:"m1",label:"今週、朝ごはんを5日以上食べる",     chk:(d)=>d.filter(x=>x.breakfast).length>=5},
  {id:"m2",label:"今週、筋トレを4回以上する",         chk:(d)=>d.filter(x=>x.exercise).length>=4},
  {id:"m3",label:"今週、毎日水1.5Lを達成する",        chk:(d)=>d.every(x=>x.water)},
  {id:"m4",label:"今週、間食ゼロの日を3日作る",       chk:(d)=>d.filter(x=>x.snack).length>=3},
  {id:"m5",label:"今週、21時以降食べない日を5日作る", chk:(d)=>d.filter(x=>x.noLateEat).length>=5},
  {id:"m6",label:"今週、毎日体重を記録する",          chk:(d)=>d.every(x=>x.weigh)},
  {id:"m7",label:"今週、ウォーキングを5回以上する",   chk:(d)=>d.filter(x=>x.walk).length>=5},
];
const getWeekMissions=(w)=>[ALL_MISSIONS[w%ALL_MISSIONS.length],ALL_MISSIONS[(w+1)%ALL_MISSIONS.length]];

const RANKS=[
  {name:"Bronze",min:0,  color:"#a06840",emoji:"🥉"},
  {name:"Silver",min:40, color:"#8a9aaa",emoji:"🥈"},
  {name:"Gold",  min:65, color:"#c9a84c",emoji:"🥇"},
  {name:"Wedding",min:85,color:"#3a8a5a",emoji:"💍"},
];
const getRank=(p)=>[...RANKS].reverse().find(r=>p>=r.min)||RANKS[0];
const getNextRank=(r)=>RANKS[RANKS.findIndex(x=>x.name===r.name)+1]||null;

const MEAL_RATINGS=[
  {id:5,emoji:"😇",label:"完璧",    note:"朝昼夜◎・間食なし",          color:"#3a8a5a",pts:20},
  {id:4,emoji:"🙂",label:"良い",    note:"3食・少し間食あり程度",        color:"#5aaa78",pts:15},
  {id:3,emoji:"😐",label:"普通",    note:"1食抜き or 間食やや多め",      color:"#c9a84c",pts:8},
  {id:2,emoji:"😓",label:"よくない",note:"2食抜き or 夜遅く食べた",      color:"#d08040",pts:3},
  {id:1,emoji:"🍕",label:"ダメ",    note:"食べすぎ・ジャンク・反省あり", color:"#c05030",pts:0},
];

const EX_TYPES=[
  {id:"strength",emoji:"💪",label:"筋トレ"},
  {id:"walk",    emoji:"🚶",label:"ウォーク"},
  {id:"run",     emoji:"🏃",label:"ランニング"},
  {id:"stretch", emoji:"🧘",label:"ストレッチ"},
  {id:"swim",    emoji:"🏊",label:"水泳"},
  {id:"cycle",   emoji:"🚴",label:"サイクル"},
  {id:"other",   emoji:"⚡",label:"その他"},
];
const EX_DURS=[10,20,30,45,60,90];
const DOW=["月","火","水","木","金","土","日"];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const toKey=(d)=>d.toISOString().slice(0,10);
const todayKey=()=>toKey(new Date());
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const getISOWeek=(d)=>{
  const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);
  const w=new Date(t.getFullYear(),0,4);
  return Math.round(((t-w)/86400000-3+(w.getDay()+6)%7)/7)+1;
};
const getWeekDays=()=>{
  const now=new Date(),dow=(now.getDay()+6)%7;
  return Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-dow+i);return toKey(d);});
};
const blankStore=()=>({tasks:{},weights:{},meals:{},exercises:[]});
const el=(id)=>document.getElementById(id);
const G={pri:"#3a8a5a",priMid:"#5aaa78",priLight:"#c8e6c9",priXLight:"#edf7ed",muted:"#6a8a6a",border:"#d4e8d4",text:"#1a2e1a"};

// ── STATE ─────────────────────────────────────────────────────────────────────
let store=blankStore();
let currentTab="today";
let wDateOffset=0;
let selExType=null;
let selExDur=null;
let syncTimer=null;
let prevLv=null;

// ── SYNC ──────────────────────────────────────────────────────────────────────
function setSyncStatus(s){
  const el2=el("sync-status");
  if(!el2)return;
  const map={idle:"",syncing:"同期中...",saved:"✓ 保存済み",error:"⚠ 同期エラー"};
  const col={idle:"",syncing:G.pri,saved:"#5aaa78",error:"#c05030"};
  el2.textContent=map[s]||"";
  el2.style.color=col[s]||"";
}
function scheduleSync(){
  if(syncTimer)clearTimeout(syncTimer);
  setSyncStatus("syncing");
  syncTimer=setTimeout(async()=>{
    try{await ghSave(store);setSyncStatus("saved");setTimeout(()=>setSyncStatus("idle"),2000);}
    catch(e){setSyncStatus("error");}
  },1200);
}
function updateStore(ns){store=ns;scheduleSync();render();}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.createElement("div");
  t.className="toast";t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

// ── DERIVED ───────────────────────────────────────────────────────────────────
function getStreak(){
  let c=0;const now=new Date();
  for(let i=0;;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const p=TASKS.filter(t=>((store.tasks||{})[toKey(d)]||{})[t.id]).reduce((s,t)=>s+t.points,0);
    if(p>0)c++;else break;
  }
  return c;
}
function getTotalXP(){
  return Object.entries(store.tasks||{}).reduce((sum,[date,day])=>{
    const mp=(MEAL_RATINGS.find(r=>r.id===((store.meals||{})[date]||0))?.pts)||0;
    return sum+TASKS.filter(t=>day[t.id]).reduce((s,t)=>s+t.points,0)+mp;
  },0);
}
function getWeightHistory(){
  return Object.entries(store.weights||{}).filter(([,v])=>v!=null)
    .sort(([a],[b])=>a.localeCompare(b)).slice(-30)
    .map(([date,v])=>({label:date.slice(5),v}));
}

// ── SVG LINE CHART ─────────────────────────────────────────────────────────────
function lineChart(data,color,height){
  if(!data||data.length<2)return`<div style="height:${height}px;display:flex;align-items:center;justify-content:center;color:${G.muted};font-size:11px">2件以上で表示されます</div>`;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const pad=26,W=320,H=height;
  const px=(i)=>pad+(i/(data.length-1))*(W-pad*2);
  const py=(v)=>mx===mn?H/2:H-pad-(((v-mn)/(mx-mn))*(H-pad*2));
  const pts=data.map((d,i)=>`${px(i)},${py(d.v)}`).join(" ");
  const area=`M${px(0)},${py(data[0].v)} `+data.map((d,i)=>`L${px(i)},${py(d.v)}`).join(" ")+` L${px(data.length-1)},${H} L${px(0)},${H} Z`;
  const step=Math.ceil(data.length/6);
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#ag)"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    ${data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.v)}" r="3.5" fill="${color}"/>${(i===0||i===data.length-1||i%step===0)?`<text x="${px(i)}" y="${py(d.v)-8}" text-anchor="middle" font-size="8" fill="${G.muted}">${d.v}</text><text x="${px(i)}" y="${H-1}" text-anchor="middle" font-size="7" fill="${G.muted}">${d.label}</text>`:""}`).join("")}
  </svg>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const key=todayKey();
  const tasks=store.tasks||{};
  const weights=store.weights||{};
  const meals=store.meals||{};
  const exLogs=store.exercises||[];
  const checked=tasks[key]||{};

  const streak=getStreak();
  const mult=streakMult(streak);
  const todayBase=TASKS.filter(t=>checked[t.id]).reduce((s,t)=>s+t.points,0);
  const mealRating=MEAL_RATINGS.find(r=>r.id===meals[key]);
  const mealPts=mealRating?mealRating.pts:0;
  const todayPts=Math.round((todayBase+mealPts)*mult);
  const todayPct=Math.round((todayBase/BASE_TOTAL)*100);
  const doneNum=TASKS.filter(t=>checked[t.id]).length;

  const totalXP=getTotalXP();
  const {cur:curLv,next:nextLv}=getLevel(totalXP);
  const xpInLevel=totalXP-curLv.xp;
  const xpNeeded=nextLv?nextLv.xp-curLv.xp:1;
  const lvPct=nextLv?Math.min(100,Math.round((xpInLevel/xpNeeded)*100)):100;

  // level up check
  if(prevLv!==null&&curLv.lv>prevLv)showToast(`🎉 LEVEL UP! Lv${curLv.lv}「${curLv.title}」`);
  prevLv=curLv.lv;

  const weekDays=getWeekDays();
  const weekNum=getISOWeek(new Date());
  const missions=getWeekMissions(weekNum);
  const weekDayData=weekDays.map(k=>tasks[k]||{});
  const weekPcts=weekDays.map(k=>{
    const d=tasks[k]||{};
    return Math.round((TASKS.filter(t=>d[t.id]).reduce((s,t)=>s+t.points,0)/BASE_TOTAL)*100);
  });
  const weekAvg=Math.round(weekPcts.reduce((s,v)=>s+v,0)/7);
  const rank=getRank(weekAvg);
  const nextRank=getNextRank(rank);
  const missionsDone=missions.map(m=>m.chk(weekDayData.map(d=>Object.fromEntries(TASKS.map(t=>[t.id,!!d[t.id]])))));

  const weightHistory=getWeightHistory();
  const latestW=weightHistory.length?weightHistory[weightHistory.length-1].v:null;
  const firstW=weightHistory.length?weightHistory[0].v:null;
  const wDiff=latestW&&firstW?(latestW-firstW).toFixed(1):null;

  const exByDay={};
  exLogs.forEach(e=>{exByDay[e.date]=(exByDay[e.date]||0)+Number(e.duration||0);});
  const ex14=Array.from({length:14},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(13-i));
    const k=toKey(d);
    return{label:DOW[(d.getDay()+6)%7],v:exByDay[k]||0,key:k};
  });
  const todayExLogs=exLogs.filter(e=>e.date===key);
  const wTargetDate=toKey(addDays(new Date(),wDateOffset));
  const wVal=(weights[wTargetDate]||"");

  // ── tab contents ──────────────────────────────────────────────────────────
  let tabHtml="";

  if(currentTab==="today"){
    // ring
    const circ=2*Math.PI*28;
    const offset=circ*(1-todayPct/100);
    tabHtml+=`<div class="card" style="display:flex;align-items:center;gap:16px">
      <div style="position:relative;width:70px;height:70px;flex-shrink:0">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="28" fill="none" stroke="${G.priLight}" stroke-width="6"/>
          <circle cx="35" cy="35" r="28" fill="none" stroke="${G.pri}" stroke-width="6"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
            stroke-linecap="round" transform="rotate(-90 35 35)" style="transition:stroke-dashoffset 0.5s"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:800;color:${G.pri}">${todayPct}%</div>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;margin-bottom:3px">${todayPct===100?"完璧！満点🎉":todayPct>=80?"あと少し！":todayPct>=50?"いい調子！":"今日も頑張ろう！"}</div>
        <div style="font-size:11px;color:${G.muted}">${doneNum}/${TASKS.length} タスク完了</div>
        ${mealRating?`<div style="margin-top:4px;font-size:11px;color:${mealRating.color};font-weight:600">${mealRating.emoji} 食事: ${mealRating.label}</div>`:""}
        ${mult>1?`<div style="margin-top:5px;font-size:10px;background:${G.priXLight};display:inline-block;padding:2px 8px;border-radius:10px;color:${G.pri};font-weight:700">🔥 ×${mult}倍ボーナス中</div>`:""}
      </div>
    </div>`;

    // tasks
    TASKS.forEach(task=>{
      const done=!!checked[task.id];
      const bpts=Math.round(task.points*mult);
      const isB=task.id==="breakfast";
      tabHtml+=`<button class="task-btn${done?" done":isB&&!done?" breakfast-pending":""}" onclick="toggleTask('${task.id}')">
        <span style="font-size:20px">${task.emoji}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:${done?700:500};color:${done?G.text:G.muted}">${task.label}</div>
          ${isB&&!done?`<div style="font-size:9px;color:#c08020;margin-top:2px">${task.note}</div>`:""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;font-weight:700;color:${done?G.pri:isB?"#c08020":G.border}">+${bpts}pt</div>
          ${mult>1?`<div style="font-size:8px;color:${G.priMid}">base ${task.points}</div>`:""}
        </div>
        <div class="check-circle${done?" done"}">${done?"✓":""}</div>
      </button>`;
    });

    // meal shortcut
    tabHtml+=`<div class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="setTab('meal')">
      <span style="font-size:22px">${mealRating?mealRating.emoji:"🍽️"}</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700">${mealRating?"食事記録: "+mealRating.label:"食事の記録をつける"}</div>
        <div style="font-size:10px;color:${G.muted};margin-top:1px">${mealRating?`+${mealRating.pts}pt獲得`:"「食事」タブで記録 →"}</div>
      </div>
    </div>`;
  }

  else if(currentTab==="meal"){
    tabHtml+=`<div class="card">
      <div class="label">🍽️ 今日の食事</div>

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setTab(t){currentTab=t;render();}
function setWOffset(n){wDateOffset=n;render();}

function toggleTask(id){
  const key=todayKey();
  const tasks=store.tasks||{};
  const checked=tasks[key]||{};
  const updated={...checked,[id]:!checked[id]};
  updateStore({...store,tasks:{...tasks,[key]:updated}});
}

function rateMeal(id){
  updateStore({...store,meals:{...(store.meals||{}),[todayKey()]:id}});
}

function adjWeight(delta){
  const inp=el("w-input");
  if(!inp)return;
  const cur=parseFloat(inp.value)||0;
  const next=Math.round((cur+delta)*10)/10;
  if(next>=30&&next<=300)inp.value=next;
}

function saveWeight(){
  const inp=el("w-input");
  if(!inp)return;
  const v=parseFloat(inp.value);
  if(isNaN(v)||v<30||v>300)return;
  const wTargetDate=toKey(addDays(new Date(),wDateOffset));
  updateStore({...store,weights:{...(store.weights||{}),[wTargetDate]:v}});
  const btn=el("w-save-btn");
  if(btn){btn.textContent="✓ 記録しました";btn.style.background="#5aaa78";setTimeout(()=>{if(btn){btn.textContent="この体重で記録";btn.style.background=G.pri;}},1500);}
}

function selType(id){selExType=EX_TYPES.find(t=>t.id===id)||null;render();}
function selDur(d){selExDur=d;render();}

function saveExercise(){
  if(!selExType||!selExDur)return;
  const entry={id:Date.now(),date:todayKey(),type:selExType.label,emoji:selExType.emoji,duration:selExDur};
  updateStore({...store,exercises:[...(store.exercises||[]),entry]});
  selExType=null;selExDur=null;
}

function deleteEx(id){
  updateStore({...store,exercises:(store.exercises||[]).filter(e=>e.id!==id)});
}

// ── SETUP SCREEN ──────────────────────────────────────────────────────────────
function renderSetup(errMsg){
  el("root").innerHTML=`<div class="setup">
    <div class="setup-card">
      <div style="font-size:32px;text-align:center;margin-bottom:12px">🤵</div>
      <div style="font-size:18px;font-weight:800;text-align:center;margin-bottom:6px">初回セットアップ</div>
      <div style="font-size:12px;color:${G.muted};text-align:center;margin-bottom:20px;line-height:1.6">
        GitHubのPersonal Access Tokenを入力してください。データの保存に使用します。
      </div>
      <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxx"
        style="width:100%;padding:12px;border-radius:10px;border:1.5px solid ${G.border};font-size:13px;color:${G.text};background:#f2f6f2;margin-bottom:10px;box-sizing:border-box"/>
      ${errMsg?`<div style="font-size:11px;color:#c05030;margin-bottom:10px;line-height:1.5">${errMsg}</div>`:""}
      <button id="setup-btn" class="btn-pri" onclick="doSetup()">接続してスタート</button>
      <div style="font-size:10px;color:${G.muted};margin-top:12px;text-align:center;line-height:1.6">
        トークンはこの端末のみに保存されます
      </div>
    </div>
  </div>`;
}

async function doSetup(){
  const inp=el("token-input");
  const btn=el("setup-btn");
  if(!inp||!inp.value.trim())return;
  setToken(inp.value.trim());
  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span> 接続中...`;
  try{
    const data=await ghFetch();
    store=data||blankStore();
    render();
  }catch(e){
    setToken("");
    renderSetup("トークンが正しくないか、data.jsonが見つかりません。確認してください。");
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  el("root").innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px"><div class="spinner"></div><div style="font-size:13px;color:${G.muted}">読み込み中...</div></div>`;
  const token=getToken();
  if(!token){renderSetup();return;}
  try{
    store=await ghFetch()||blankStore();
    render();
  }catch(e){
    setToken("");renderSetup("再接続が必要です。トークンを再入力してください。");
  }
}

init();
</script>
